<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#080c1a">
<title>唯一 — 享受今晚</title>
<!-- v25.0625.3 听书+解压 -->

<!-- Fonts: 系统字体栈，无需外部加载 -->
<style>
/* ═══════════════════════════════════════════════════════
   「唯一」 Design System v3
   设计参考：X (Twitter) 克制排版 + Tumblr 艺术感 + 小红书社区温度
   核心隐喻：星尘·宇宙·漂流
   ═══════════════════════════════════════════════════════ */

/* ═══ Design Tokens ═══ */
:root {
  /* 暗色宇宙调色板 */
  --space-deep: #060914;
  --space: #0b1024;
  --space-light: #111838;
  --surface: rgba(17, 24, 56, 0.6);
  --surface-hover: rgba(25, 34, 72, 0.75);
  --glass: rgba(15, 20, 45, 0.7);
  --glass-border: rgba(212, 168, 83, 0.1);

  /* 文字层级 */
  --text-primary: #ebe5d5;
  --text-secondary: #9a9db8;
  --text-tertiary: #6b6f8a;
  --text-muted: #4a4d60;

  /* 强调色 */
  --gold: #d4a853;
  --gold-light: #e8c76a;
  --gold-soft: rgba(212, 168, 83, 0.1);
  --rose: #d4848c;
  --rose-soft: rgba(212, 132, 140, 0.08);
  --rose-deep: #b86a72;

  /* 分类色 */
  --cat-poetry: #e8c76a;
  --cat-quote: #7bb8d4;
  --cat-essay: #9b8ec4;
  --cat-music: #d4848c;
  --cat-film: #8ba5a5;

  /* 间距与圆角 */
  --space-xs: 4px;
  --space-sm: 8px;
  --space-md: 16px;
  --space-lg: 24px;
  --space-xl: 32px;
  --space-2xl: 48px;
  --radius-sm: 8px;
  --radius: 14px;
  --radius-lg: 20px;
  --radius-xl: 28px;
  --radius-full: 9999px;

  /* 阴影 */
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.25);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.35);
  --shadow-gold: 0 0 60px rgba(212, 168, 83, 0.06);

  /* 动效 */
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
  --duration-fast: 150ms;
  --duration-normal: 300ms;
  --duration-slow: 500ms;

  /* 字体 */
  --font-serif: 'SimSun', 'STSong', 'Noto Serif SC', serif;
  --font-sans: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
  --font-mono: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
}

/* ═══ Reset ═══ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html {
  font-size: 16px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  scroll-behavior: smooth;
}

body {
  font-family: var(--font-sans);
  background: var(--space-deep);
  color: var(--text-primary);
  min-height: 100vh;
  min-height: 100dvh;
  -webkit-tap-highlight-color: transparent;
  overflow-x: hidden;
  line-height: 1.6;
  letter-spacing: 0.01em;
}

::selection {
  background: rgba(212, 168, 83, 0.2);
  color: var(--text-primary);
}

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(212, 168, 83, 0.12); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: rgba(212, 168, 83, 0.25); }

/* ═══ Canvas 星空 ═══ */
.stars-bg {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}
#starCanvas { width: 100%; height: 100%; }

/* ═══ App 容器 ═══ */
.app {
  position: relative;
  z-index: 1;
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* ═══════════════════ Hero ═══════════════════ */
.hero {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 92vh;
  min-height: 92dvh;
  padding: var(--space-xl);
  text-align: center;
  overflow: hidden;
}

.hero-constellation {
  position: absolute;
  inset: 0;
  opacity: 0.5;
}
.hero-constellation canvas { width: 100%; height: 100%; }

.hero-content {
  position: relative;
  z-index: 2;
  animation: heroReveal 1.2s var(--ease-out) both;
}

@keyframes heroReveal {
  from { opacity: 0; transform: translateY(40px); }
  to { opacity: 1; transform: translateY(0); }
}

.hero-title {
  font-family: var(--font-serif);
  font-size: clamp(48px, 8vw, 80px);
  font-weight: 700;
  letter-spacing: 0.15em;
  display: flex;
  gap: 0.15em;
  justify-content: center;
  margin-bottom: var(--space-md);
}

.hero-char {
  display: inline-block;
  background: linear-gradient(180deg, var(--gold-light) 0%, var(--gold) 40%, #9a6c2e 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: charFloat 3s ease-in-out infinite;
}
.hero-char:nth-child(1) { animation-delay: 0s; }
.hero-char:nth-child(2) { animation-delay: 0.15s; }

@keyframes charFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}

.hero-subtitle {
  font-family: var(--font-serif);
  font-size: clamp(15px, 2.5vw, 20px);
  color: var(--text-secondary);
  font-weight: 400;
  letter-spacing: 0.12em;
  margin-bottom: var(--space-xl);
  opacity: 0;
  animation: subtitleReveal 1s 0.5s var(--ease-out) forwards;
}

@keyframes subtitleReveal {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 0.7; transform: translateY(0); }
}

.hero-daily {
  display: inline-block;
  font-family: var(--font-serif);
  font-size: 15px;
  font-style: italic;
  color: var(--gold-light);
  opacity: 0.65;
  letter-spacing: 0.08em;
  line-height: 1.8;
  max-width: 420px;
  padding: var(--space-md) var(--space-lg);
  background: var(--gold-soft);
  border-radius: var(--radius-lg);
  border: 1px solid rgba(212, 168, 83, 0.08);
  animation: dailyPulse 4s ease-in-out infinite;
}

@keyframes dailyPulse {
  0%, 100% { opacity: 0.5; }
  50% { opacity: 0.8; }
}

.hero-scroll {
  position: absolute;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%);
  color: var(--text-tertiary);
  cursor: pointer;
  animation: scrollBounce 2s ease-in-out infinite;
  opacity: 0.5;
  transition: opacity var(--duration-fast);
}
.hero-scroll:hover { opacity: 1; }

@keyframes scrollBounce {
  0%, 100% { transform: translateX(-50%) translateY(0); }
  50% { transform: translateX(-50%) translateY(8px); }
}

/* ═══════════════════ Navigation ═══════════════════ */
.nav {
  position: sticky;
  top: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px var(--space-lg);
  background: rgba(6, 9, 20, 0.78);
  backdrop-filter: saturate(180%) blur(24px);
  -webkit-backdrop-filter: saturate(180%) blur(24px);
  border-bottom: 1px solid rgba(212, 168, 83, 0.06);
  transition: all var(--duration-normal);
}

.nav.scrolled {
  box-shadow: 0 1px 20px rgba(0,0,0,0.3);
}

.nav-brand {
  font-family: var(--font-serif);
  font-size: 20px;
  font-weight: 700;
  letter-spacing: 0.2em;
  background: linear-gradient(135deg, var(--gold-light), var(--gold));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  cursor: pointer;
  user-select: none;
}

.nav-tabs {
  display: flex;
  gap: 2px;
  background: rgba(255,255,255,0.02);
  border-radius: var(--radius-full);
  padding: 3px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  max-width: calc(100vw - 100px);
  mask: linear-gradient(90deg, transparent 0%, #000 5%, #000 95%, transparent 100%);
  -webkit-mask: linear-gradient(90deg, transparent 0%, #000 5%, #000 95%, transparent 100%);
}
.nav-tabs::-webkit-scrollbar { display: none; }

.nav-tab {
  display: flex;
  align-items: center;
  gap: 3px;
  background: none;
  border: none;
  color: var(--text-tertiary);
  font-size: 12px;
  font-weight: 500;
  padding: 6px 12px;
  border-radius: var(--radius-full);
  cursor: pointer;
  font-family: inherit;
  transition: all var(--duration-normal);
  white-space: nowrap;
  flex-shrink: 0;
}
@media (min-width: 480px) {
  .nav-tab { font-size: 13px; padding: 8px 16px; gap: 5px; }
}
.nav-tab:hover { color: var(--text-secondary); }
.nav-tab:active { transform: scale(0.96); }
.nav-tab.active {
  color: var(--gold-light);
  background: var(--gold-soft);
  font-weight: 600;
}
.nav-tab-icon { font-size: 15px; line-height: 1; }
.nav-tab-label { letter-spacing: 0.04em; }

.nav-bottle {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  background: rgba(212, 132, 140, 0.08);
  border: 1px solid rgba(212, 132, 140, 0.15);
  color: var(--rose);
  font-size: 18px;
  cursor: pointer;
  transition: all var(--duration-normal);
  display: flex;
  align-items: center;
  justify-content: center;
}
.nav-bottle:hover {
  background: rgba(212, 132, 140, 0.15);
  transform: scale(1.08);
}
.nav-bottle:active { transform: scale(0.92); }

/* ═══════════════════ Main Content ═══════════════════ */
.main {
  flex: 1;
  padding: var(--space-md) var(--space-lg) 120px;
  position: relative;
  z-index: 1;
}

.tab-content {
  display: none;
  animation: tabEnter 0.45s var(--ease-out);
}
.tab-content.active { display: block; }

@keyframes tabEnter {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ═══════════════════ Category Bar ═══════════════════ */
.category-bar {
  display: flex;
  gap: var(--space-sm);
  padding: var(--space-sm) 0 var(--space-lg);
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  mask: linear-gradient(90deg, transparent, #000 3%, #000 97%, transparent);
  -webkit-mask: linear-gradient(90deg, transparent, #000 3%, #000 97%, transparent);
}
.category-bar::-webkit-scrollbar { display: none; }

.category-chip {
  flex-shrink: 0;
  padding: 7px 18px;
  border-radius: var(--radius-full);
  border: 1px solid rgba(255,255,255,0.06);
  background: var(--surface);
  color: var(--text-tertiary);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  font-family: inherit;
  transition: all var(--duration-normal);
  white-space: nowrap;
}
.category-chip:hover {
  border-color: rgba(212, 168, 83, 0.2);
  color: var(--text-secondary);
}
.category-chip.active {
  background: var(--gold-soft);
  border-color: var(--gold);
  color: var(--gold-light);
  font-weight: 600;
}

/* ═══════════════════ Masonry Grid ═══════════════════ */
.masonry {
  columns: 1;
  column-gap: var(--space-md);
}
@media (min-width: 640px) { .masonry { columns: 2; } }
@media (min-width: 1024px) { .masonry { columns: 3; column-gap: var(--space-lg); } }

/* ═══════════════════ Post Card ═══════════════════ */
.post-card {
  break-inside: avoid;
  margin-bottom: var(--space-md);
  background: var(--surface);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-radius: var(--radius);
  border: 1px solid var(--glass-border);
  padding: 20px 18px;
  transition: all 0.35s var(--ease-smooth);
  position: relative;
  overflow: hidden;
  cursor: default;
  box-shadow: var(--shadow-sm);
  animation: cardAppear 0.5s var(--ease-out) both;
}

@keyframes cardAppear {
  from { opacity: 0; transform: translateY(24px) scale(0.98); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.post-card:hover {
  background: var(--surface-hover);
  border-color: rgba(212, 168, 83, 0.18);
  transform: translateY(-2px);
  box-shadow: var(--shadow-md), 0 0 50px rgba(212, 168, 83, 0.04);
}

.post-card.curated {
  border-left: 2px solid var(--gold);
}

/* 卡片的左侧彩色条 */
.post-card::before {
  content: '';
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 2px;
  border-radius: 2px 0 0 2px;
  transition: width 0.3s var(--ease-smooth);
  opacity: 0.5;
}
.post-card:hover::before { width: 3px; opacity: 0.8; }

.post-card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}
.post-card-meta {
  display: flex;
  align-items: center;
  gap: 10px;
}
.post-card-mood {
  font-size: 18px;
  line-height: 1;
}
.post-card-author {
  font-size: 12.5px;
  font-weight: 500;
  color: var(--text-secondary);
  letter-spacing: 0.03em;
}
.post-card-badge {
  font-size: 10px;
  padding: 2px 8px;
  border-radius: var(--radius-full);
  background: var(--gold-soft);
  color: var(--gold-light);
  font-weight: 500;
  letter-spacing: 0.05em;
}
.post-card-badge.poetry { background: rgba(232,199,106,0.1); color: var(--cat-poetry); }
.post-card-badge.quote { background: rgba(123,184,212,0.1); color: var(--cat-quote); }
.post-card-badge.essay { background: rgba(155,142,196,0.1); color: var(--cat-essay); }
.post-card-badge.music { background: rgba(212,132,140,0.1); color: var(--cat-music); }

.post-card-time {
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 0.02em;
}

.post-card-body {
  font-size: 14.5px;
  line-height: 1.85;
  color: var(--text-primary);
  white-space: pre-wrap;
  word-break: break-word;
  font-weight: 400;
  letter-spacing: 0.015em;
}

.post-card-image {
  margin-top: 12px;
  border-radius: var(--radius-sm);
  overflow: hidden;
  border: 1px solid rgba(255,255,255,0.04);
}
.post-card-image img {
  width: 100%;
  max-height: 400px;
  object-fit: cover;
  display: block;
  transition: transform 0.5s ease;
}
.post-card:hover .post-card-image img {
  transform: scale(1.03);
}

.post-card-source {
  margin-top: 8px;
  font-size: 11px;
  color: var(--text-muted);
  font-style: italic;
  text-align: right;
  opacity: 0.6;
}

.post-card-actions {
  display: flex;
  gap: 14px;
  margin-top: 14px;
  padding-top: 10px;
  border-top: 1px solid rgba(255,255,255,0.03);
}

.post-action {
  display: flex;
  align-items: center;
  gap: 5px;
  background: none;
  border: none;
  color: var(--text-tertiary);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  padding: 5px 8px;
  border-radius: 6px;
  transition: all var(--duration-fast);
  font-family: inherit;
}
.post-action:hover {
  background: rgba(255,255,255,0.04);
  color: var(--text-secondary);
}
.post-action:active { transform: scale(0.94); }
.post-action.liked { color: var(--rose); background: var(--rose-soft); }
.post-action.hugged { color: var(--gold-light); background: var(--gold-soft); }
.post-action-count {
  font-size: 12px;
  min-width: 16px;
  text-align: center;
  font-variant-numeric: tabular-nums;
}

/* Like 动画 */
@keyframes heartBurst {
  0% { transform: scale(1); }
  30% { transform: scale(1.3); }
  60% { transform: scale(0.95); }
  100% { transform: scale(1); }
}
.post-action.just-liked { animation: heartBurst 0.4s var(--ease-spring); }

/* ═══════════════════ Curated Page ═══════════════════ */
.curated-intro {
  text-align: center;
  padding: var(--space-xl) var(--space-lg) var(--space-2xl);
}
.curated-title {
  font-family: var(--font-serif);
  font-size: clamp(24px, 4vw, 36px);
  font-weight: 700;
  color: var(--gold-light);
  letter-spacing: 0.1em;
  margin-bottom: var(--space-sm);
}
.curated-desc {
  font-size: 14px;
  color: var(--text-secondary);
  max-width: 420px;
  margin: 0 auto;
  line-height: 1.7;
  opacity: 0.7;
}

.curated-section {
  margin-bottom: var(--space-2xl);
}
.curated-section-header {
  display: flex;
  align-items: center;
  gap: var(--space-sm);
  margin-bottom: var(--space-lg);
  padding-bottom: var(--space-sm);
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.curated-section-icon { font-size: 20px; }
.curated-section-title {
  font-family: var(--font-serif);
  font-size: 18px;
  font-weight: 600;
  color: var(--text-primary);
  letter-spacing: 0.06em;
}
.curated-section-count {
  font-size: 12px;
  color: var(--text-tertiary);
  margin-left: auto;
}

.curated-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: var(--space-md);
}
@media (min-width: 640px) { .curated-grid { grid-template-columns: repeat(2, 1fr); } }
@media (min-width: 1024px) { .curated-grid { grid-template-columns: repeat(3, 1fr); } }

/* ═══════════════════ Write Panel ═══════════════════ */
.write-panel {
  max-width: 600px;
  margin: 0 auto;
  padding: var(--space-lg) 0;
}

.write-header {
  text-align: center;
  margin-bottom: var(--space-lg);
}
.write-header h2 {
  font-family: var(--font-serif);
  font-size: 24px;
  font-weight: 700;
  color: var(--gold-light);
  letter-spacing: 0.08em;
  margin-bottom: var(--space-xs);
}
.write-header p {
  font-size: 13px;
  color: var(--text-tertiary);
}

.write-panel textarea {
  width: 100%;
  min-height: 200px;
  background: var(--surface);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
  color: var(--text-primary);
  padding: 18px 20px;
  font-size: 15px;
  line-height: 1.9;
  resize: vertical;
  font-family: inherit;
  transition: all var(--duration-normal);
  letter-spacing: 0.02em;
}
.write-panel textarea:focus {
  outline: none;
  border-color: var(--gold);
  box-shadow: 0 0 0 3px var(--gold-soft);
}
.write-panel textarea::placeholder {
  color: var(--text-muted);
  opacity: 0.4;
  font-style: italic;
}

.write-char-count {
  text-align: right;
  font-size: 11px;
  color: var(--text-muted);
  margin-top: var(--space-xs);
  padding-right: 4px;
}

.write-image-row {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: var(--space-sm);
  margin: var(--space-md) 0;
}
.write-image-name {
  font-size: 12px;
  color: var(--text-tertiary);
  max-width: 160px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.write-image-preview {
  display: block;
  max-width: 100%;
  border-radius: var(--radius-sm);
  margin-bottom: var(--space-md);
  border: 1px solid rgba(255,255,255,0.06);
}

/* Mood Picker */
.mood-picker {
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-sm);
  margin-bottom: var(--space-lg);
}
.mood-chip {
  padding: 8px 16px;
  border-radius: var(--radius-full);
  border: 1px solid rgba(255,255,255,0.06);
  background: var(--surface);
  color: var(--text-tertiary);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  font-family: inherit;
  transition: all var(--duration-normal);
  display: flex;
  align-items: center;
  gap: 5px;
}
.mood-chip:hover {
  border-color: rgba(212, 168, 83, 0.25);
  color: var(--text-secondary);
}
.mood-chip:active { transform: scale(0.95); }
.mood-chip.selected {
  border-color: var(--gold);
  color: var(--gold-light);
  background: var(--gold-soft);
  font-weight: 600;
}

.input-nickname {
  width: 100%;
  background: var(--surface);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  padding: 12px 16px;
  font-size: 14px;
  margin-bottom: var(--space-lg);

  let fp = localStorage.getItem('weiyi_fp');
  if (!fp) {
    fp = 'fp_' + Date.now() + '_' + Math.random().toString(36).slice(2, 10);
    localStorage.setItem('weiyi_fp', fp);
  }

// ═══════════════════ Star Canvas ═══════════════════
function initStarCanvas() {
  const canvas = document.getElementById('starCanvas');
  const ctx = canvas.getContext('2d');
  let stars = [];
  let animFrame;

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }

  function createStars() {
    const count = Math.floor((canvas.width * canvas.height) / 3500);
    stars = [];
    for (let i = 0; i < count; i++) {
      stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 1.4 + 0.3,
        twinkleSpeed: Math.random() * 0.008 + 0.003,
        twinkleOffset: Math.random() * Math.PI * 2,
        hue: Math.random() < 0.15 ? 42 + Math.random() * 15 : 0, // 15% 金色星
        alpha: Math.random() * 0.5 + 0.3,
      });
    }
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const t = Date.now() * 0.001;

    for (const s of stars) {
      const alpha = s.alpha + Math.sin(t * s.twinkleSpeed * 60 + s.twinkleOffset) * 0.25;
      const clampedAlpha = Math.max(0.1, Math.min(0.85, alpha));

      if (s.hue > 0) {
        ctx.fillStyle = `hsla(${s.hue}, 60%, 75%, ${clampedAlpha})`;
      } else {
        ctx.fillStyle = `rgba(220,220,235,${clampedAlpha})`;
      }

      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fill();

      // 偶尔加辉光
      if (clampedAlpha > 0.6) {
        ctx.fillStyle = s.hue > 0
          ? `hsla(${s.hue}, 60%, 75%, ${clampedAlpha * 0.15})`
          : `rgba(220,220,235,${clampedAlpha * 0.12})`;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r * 3, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    animFrame = requestAnimationFrame(draw);
  }

  resize();
  createStars();
  draw();
  window.addEventListener('resize', () => { resize(); createStars(); });
}

// ═══════════════════ Hero Constellation ═══════════════════
function initHeroConstellation() {
  const container = document.getElementById('heroConstellation');
  const canvas = document.createElement('canvas');
  container.appendChild(canvas);
  const ctx = canvas.getContext('2d');

  let points = [];
  const CONNECT_DIST = 120;

  function resize() {
    canvas.width = container.offsetWidth;
    canvas.height = container.offsetHeight;
  }

  function createPoints() {
    const count = 25;
    points = [];
    for (let i = 0; i < count; i++) {
      points.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        vx: (Math.random() - 0.5) * 0.3,
        vy: (Math.random() - 0.5) * 0.3,
        r: Math.random() * 1.5 + 0.5,
        alpha: Math.random() * 0.5 + 0.2,
      });
    }
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 连线
    for (let i = 0; i < points.length; i++) {
      for (let j = i + 1; j < points.length; j++) {
        const dx = points[i].x - points[j].x;
        const dy = points[i].y - points[j].y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < CONNECT_DIST) {
          const alpha = (1 - dist / CONNECT_DIST) * 0.12;
          ctx.strokeStyle = `rgba(212,168,83,${alpha})`;
          ctx.lineWidth = 0.5;
          ctx.beginPath();
          ctx.moveTo(points[i].x, points[i].y);
          ctx.lineTo(points[j].x, points[j].y);
          ctx.stroke();
        }
      }
    }

    // 点
    for (const p of points) {
      ctx.fillStyle = `rgba(232,199,106,${p.alpha})`;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();

      // 移动
      p.x += p.vx;
      p.y += p.vy;
      if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
      if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
    }

    requestAnimationFrame(draw);
  }

  resize();
  createPoints();
  draw();
  window.addEventListener('resize', () => { resize(); createPoints(); });
}

// ═══════════════════ Stardust Posts ═══════════════════
async function loadStardustPosts(reset = false) {
  if (state.isLoading) return;
  if (reset) {
    state.stardustPage = 1;
    state.hasMoreStardust = true;
    state.cardCounter = 0;
    document.getElementById('masonryGrid').innerHTML = '';
    document.getElementById('loadMore').innerHTML = '';
  }
  if (!state.hasMoreStardust) return;

  state.isLoading = true;
  const grid = document.getElementById('masonryGrid');

  try {
    const r = await fetch(API + '/api/posts?page=' + state.stardustPage + '&fingerprint=' + encodeURIComponent(state.fp));
    const d = await r.json();

    let posts = d.posts;
    // 分类过滤（前端）
    if (state.currentCategory !== 'all') {
      posts = posts.filter(p => p.category === state.currentCategory || p.mood === state.currentCategory);
    }

    if (posts.length === 0 && reset) {
      grid.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🌌</div><p class="empty-state-text">这个分类还没有星尘<br>去写点什么吧</p></div>';
    } else {
      posts.forEach((p, i) => {
        const card = createPostCard(p);
        card.style.animationDelay = (state.cardCounter * 0.05) + 's';
        state.cardCounter++;
        grid.appendChild(card);
      });
    }

    state.hasMoreStardust = d.has_more;
    state.stardustPage++;

    const loadMore = document.getElementById('loadMore');
    if (state.hasMoreStardust) {
      loadMore.innerHTML = '<div class="load-more"><button class="load-more-btn" id="loadMoreBtn">✨ 更多星尘</button></div>';
      document.getElementById('loadMoreBtn')?.addEventListener('click', () => loadStardustPosts());
    } else {
      loadMore.innerHTML = Array.from(grid.children).length > 0
        ? '<div class="end-marker">— 已经到底啦 —</div>'
        : '';
    }
  } catch (e) {
    if (reset) grid.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🛰️</div><p class="empty-state-text">连接星尘失败<br>请检查网络</p></div>';
  }

  state.isLoading = false;
}

function createPostCard(p) {
  const card = document.createElement('div');
  card.className = 'post-card' + (p.is_curated ? ' curated' : '');

  // 左侧色条
  card.style.setProperty('--mood-color', p.mood_color);

  // Badge 类名映射
  const badgeClassMap = { '诗歌': 'poetry', '语录': 'quote', '随笔': 'essay', '音乐': 'music', '光影': 'film' };
  const badgeClass = badgeClassMap[p.category] || '';

  card.innerHTML = `
    <div class="post-card-header">
      <div class="post-card-meta">
        <span class="post-card-mood">${p.mood_emoji}</span>
        <span class="post-card-author">${escHtml(p.nickname)}</span>
        ${p.is_curated && p.category ? `<span class="post-card-badge ${badgeClass}">${p.category}</span>` : ''}
      </div>
      <span class="post-card-time">${timeAgo(p.created_at)}</span>
    </div>
    <div class="post-card-body">${escHtml(p.content)}</div>
    ${p.image ? `<div class="post-card-image"><img src="${p.image}" alt="星尘图片" loading="lazy"></div>` : ''}
    ${p.source ? `<div class="post-card-source">—— ${escHtml(p.source)}</div>` : ''}
    <div class="post-card-actions">
      <button class="post-action like-btn${p.liked_by_me ? ' liked' : ''}" data-id="${p.id}">
        ❤️ <span class="post-action-count">${p.like_count || 0}</span>
      </button>
      <button class="post-action hug-btn${p.hugged_by_me ? ' hugged' : ''}" data-id="${p.id}">
        🫂 <span class="post-action-count">${p.hug_count || 0}</span>
      </button>
    </div>
  `;

  // Like
  card.querySelector('.like-btn')?.addEventListener('click', async function(e) {
    e.stopPropagation();
    const id = this.dataset.id;
    this.classList.add('just-liked');
    setTimeout(() => this.classList.remove('just-liked'), 400);
    try {
      const r = await fetch(API + '/api/post/' + id + '/like', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ fingerprint: state.fp })
      });
      const d = await r.json();
      this.classList.toggle('liked', d.action === 'liked');
      this.querySelector('.post-action-count').textContent = d.like_count;
    } catch (e) {}
  });

  // Hug
  card.querySelector('.hug-btn')?.addEventListener('click', async function(e) {
    e.stopPropagation();
    const id = this.dataset.id;
    try {
      const r = await fetch(API + '/api/post/' + id + '/hug', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ fingerprint: state.fp })
      });
      const d = await r.json();
      this.classList.toggle('hugged', d.action === 'hugged');
      this.querySelector('.post-action-count').textContent = d.hug_count;
    } catch (e) {}
  });

  return card;
}

async function loadCuratedContent() {
  const container = document.getElementById('curatedContent');

  container.innerHTML = '<div class="loading-state"><div class="loading-dots"><span></span><span></span><span></span></div><div>正在策展星尘……</div></div>';

  try {
    const r = await fetch(API + '/api/posts/curated?fingerprint=' + encodeURIComponent(state.fp));
    const d = await r.json();
    container.innerHTML = '';

    const categoryIcons = {
      '诗歌': '🌸', '语录': '💡', '随笔': '📝', '音乐': '🎵', '光影': '🎬'

    for (const [category, posts] of Object.entries(d.categories)) {
      if (posts.length === 0) continue;

      const section = document.createElement('div');

      section.innerHTML = `

function getBestChineseVoice() {
  const voices = speechSynthesis.getVoices();
  if (voices.length === 0) return null;
  // 按自然度排序：Ting-Ting (macOS) > Google 普通话 (Android/Chrome) > 京京/粵語 > 任意 zh-CN
  const ranking = ['Ting-Ting', 'TingTing', 'Google 普通话', 'Google 國語', 'Mei-Jia', 'Sin-Ji', 'Microsoft Kangkang', 'Microsoft Yaoyao', 'zh-CN'];
  for (const name of ranking) {
    const v = voices.find(v => v.name === name && v.lang.startsWith('zh'));
    if (v) return v;
  }
  return voices.find(v => v.lang.startsWith('zh-CN')) || voices.find(v => v.lang.startsWith('zh')) || voices[0];
}

function initVoices() {
  return new Promise(resolve => {
    const voices = speechSynthesis.getVoices();
    if (voices.length > 0) { resolve(voices); return; }
    speechSynthesis.onvoiceschanged = () => resolve(speechSynthesis.getVoices());
  });
}

async function toggleListen(idx) {
  if (listenSynth) {
    listenSynth.cancel();
    resetAllListenCards();
  }

  if (listenCurrentIdx === idx) {
    listenCurrentIdx = -1;
    return;
  }

  listenCurrentIdx = idx;
  const item = LISTEN_DATA[idx];
  const card = document.getElementById('listen-card-' + idx);
  const btn = document.getElementById('listen-btn-' + idx);
  const progBar = document.getElementById('listen-progress-' + idx);
  const timeEl = document.getElementById('listen-time-' + idx);

  card.classList.add('playing');
  btn.classList.add('playing');
  btn.textContent = '⏸';

  // 等待 voices 加载（部分浏览器需要异步获取）
  await initVoices();
  
  listenSynth = window.speechSynthesis;
  listenUtterance = new SpeechSynthesisUtterance(item.tts);
  listenUtterance.lang = 'zh-CN';
  listenUtterance.rate = 0.78;   // 更慢，更从容
  listenUtterance.pitch = 0.95;  // 稍低沉，减少尖锐感
  listenUtterance.volume = 0.9;

  const bestVoice = getBestChineseVoice();
  if (bestVoice) {
    listenUtterance.voice = bestVoice;
  }

  const startTime = Date.now();
  const estDuration = item.tts.length * 65;

  const progressInterval = setInterval(() => {
    const elapsed = (Date.now() - startTime) / 1000;
    const total = estDuration / 1000;
    const pct = Math.min(100, (elapsed / total) * 100);
    progBar.style.width = pct + '%';
    const mins = Math.floor(elapsed / 60);
    const secs = Math.floor(elapsed % 60);
    timeEl.textContent = mins + ':' + (secs < 10 ? '0' : '') + secs;
  }, 250);

  listenUtterance.onend = () => {
    clearInterval(progressInterval);
    progBar.style.width = '100%';
    resetAllListenCards();
    listenCurrentIdx = -1;
  };

  listenUtterance.onerror = () => {
    clearInterval(progressInterval);
    resetAllListenCards();
    listenCurrentIdx = -1;
  };

  listenSynth.speak(listenUtterance);
}

function resetAllListenCards() {
  document.querySelectorAll('#listenGrid .audio-card').forEach(c => c.classList.remove('playing'));
  document.querySelectorAll('#listenGrid .audio-btn').forEach(b => { b.classList.remove('playing'); b.textContent = '▶'; });
}

function toggleRelax(id) {
  const item = RELAX_DATA.find(r => r.id === id);
  if (!item) return;

  const card = document.getElementById('relax-card-' + id);
  const btn = document.getElementById('relax-btn-' + id);
  const volSlider = document.getElementById('relax-vol-' + id);

  // Stop current
  if (relaxCurrentId === id && relaxSource) {
    stopRelax();
    relaxCurrentId = null;
    return;
  }

  // Stop any previous
  stopRelax();
  relaxCurrentId = id;

  // Init AudioContext
  if (!relaxCtx) {
    relaxCtx = new (window.AudioContext || window.webkitAudioContext)();
  }

  relaxGain = relaxCtx.createGain();
  relaxGain.gain.value = parseFloat(volSlider.value) / 100 * 0.3;
  relaxGain.connect(relaxCtx.destination);

  card.classList.add('playing');
  btn.classList.add('playing');
  btn.textContent = '⏸';

  if (item.freq === 'noise') {
    // Generate white/brown noise
    const bufferSize = 2 * relaxCtx.sampleRate;
    const buffer = relaxCtx.createBuffer(1, bufferSize, relaxCtx.sampleRate);
    const data = buffer.getChannelData(0);
    let b0 = 0, b1 = 0, b2 = 0;
    for (let i = 0; i < bufferSize; i++) {
      const white = Math.random() * 2 - 1;
      if (item.filter === 'lowpass') {
        // Brown noise (rain-like)
        b0 = 0.997 * b0 + 0.03 * white;
        data[i] = b0 * 2;
      } else if (item.filter === 'bandpass') {
        // Approximate bandpass
        b0 = 0.995 * b0 + 0.005 * white;
        b1 = 0.98 * b1 + 0.02 * (b0 - b1);
        data[i] = b1 * 3;
      } else {
        data[i] = white;
      }
    }
    relaxSource = relaxCtx.createBufferSource();
    relaxSource.buffer = buffer;
    relaxSource.loop = true;
    relaxSource.connect(relaxGain);
    relaxSource.start();
  } else if (item.freq === 'crackle') {
    // Fire crackle: random pops
    const bufferSize = relaxCtx.sampleRate;
    const buffer = relaxCtx.createBuffer(1, bufferSize, relaxCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) {
      if (Math.random() < 0.002) {
        data[i] = (Math.random() * 2 - 1) * 0.8;
      } else {
        data[i] = 0;
      }
    }
    relaxSource = relaxCtx.createBufferSource();
    relaxSource.buffer = buffer;
    relaxSource.loop = true;
    relaxSource.connect(relaxGain);
    relaxSource.start();
  } else if (item.freq === 'chirp') {
    // Bird-like tones: random sine chirps
    const bufferSize = relaxCtx.sampleRate * 4;
    const buffer = relaxCtx.createBuffer(1, bufferSize, relaxCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) {
      const t = i / relaxCtx.sampleRate;
      const chirpCycle = Math.floor(t / 2);
      const phaseInCycle = (t % 2) / 2;
      if (Math.random() < 0.003) {
        const freq = 600 + Math.random() * 800;
        data[i] = Math.sin(2 * Math.PI * freq * t) * 0.06 * (1 - phaseInCycle);
      } else {
        data[i] += (Math.random() * 2 - 1) * 0.01; // ambient
      }
    }
    relaxSource = relaxCtx.createBufferSource();
    relaxSource.buffer = buffer;
    relaxSource.loop = true;
    relaxSource.connect(relaxGain);
    relaxSource.start();
  }
}

function setRelaxVolume(id, val) {
  if (relaxCurrentId === id && relaxGain) {
    relaxGain.gain.value = parseFloat(val) / 100 * 0.3;
  }
}

function stopRelax() {
  if (relaxSource) {
    try { relaxSource.stop(); } catch(e) {}
    relaxSource = null;
  }
  if (relaxInterval) {
    clearInterval(relaxInterval);
    relaxInterval = null;
  }
  document.querySelectorAll('#relaxGrid .audio-card').forEach(c => c.classList.remove('playing'));
  document.querySelectorAll('#relaxGrid .audio-btn').forEach(b => { b.classList.remove('playing'); b.textContent = '▶'; });
}

// ═══════════════════ Write Form ═══════════════════
function initMoodPicker() {
  const container = document.getElementById('moodPicker');
  container.innerHTML = Object.entries(MOODS).map(([k, v]) =>
    `<span class="mood-chip${k === state.selectedMood ? ' selected' : ''}" data-mood="${k}">${v.emoji} ${k}</span>`
  ).join('');

  container.querySelectorAll('.mood-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      state.selectedMood = chip.dataset.mood;
      container.querySelectorAll('.mood-chip').forEach(c => c.classList.remove('selected'));
      chip.classList.add('selected');
    });
  });
}

function initImageUpload() {
  const input = document.getElementById('imageInput');
  const btn = document.getElementById('imageBtn');
  const nameEl = document.getElementById('imageName');
  const clearBtn = document.getElementById('imageClear');
  const preview = document.getElementById('imagePreview');

  btn.addEventListener('click', () => input.click());

  input.addEventListener('change', () => {
    const file = input.files[0];
    if (!file) return;
    nameEl.textContent = file.name;
    clearBtn.style.display = 'inline-flex';

    const reader = new FileReader();
    reader.onload = function(e) {
      const img = new Image();
      img.onload = function() {
        const canvas = document.createElement('canvas');
        let w = img.width, h = img.height;
        const maxW = 800;
        if (w > maxW) { h = h * maxW / w; w = maxW; }
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        state.uploadImageData = canvas.toDataURL('image/jpeg', 0.65);
        preview.src = state.uploadImageData;
        preview.style.display = 'block';
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });

  clearBtn.addEventListener('click', () => {
    state.uploadImageData = '';
    input.value = '';
    nameEl.textContent = '';
    clearBtn.style.display = 'none';
    preview.style.display = 'none';
  });
}

function initWriteForm() {
  const textarea = document.getElementById('writeContent');
  const charCount = document.getElementById('charCount');

  textarea.addEventListener('input', () => {
    charCount.textContent = textarea.value.length;
    charCount.style.color = textarea.value.length > 900 ? 'var(--rose)' : 'var(--text-muted)';
  });

  document.getElementById('sendBtn').addEventListener('click', async () => {
    const content = textarea.value.trim();
    if (!content) { toast('写点什么吧 ✨'); return; }

    const btn = document.getElementById('sendBtn');
    btn.disabled = true;
    btn.innerHTML = '<span>正在化作星尘……</span>';

    try {
      const r = await fetch(API + '/api/post', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          content,
          image: state.uploadImageData,
          mood: state.selectedMood,
          nickname: document.getElementById('writeNickname').value.trim(),
          fingerprint: state.fp,
        })
      });
      const d = await r.json();
      if (d.success) {
        textarea.value = '';
        document.getElementById('writeNickname').value = '';
        state.uploadImageData = '';
        document.getElementById('imageInput').value = '';
        document.getElementById('imageName').textContent = '';
        document.getElementById('imageClear').style.display = 'none';
        document.getElementById('imagePreview').style.display = 'none';
        charCount.textContent = '0';
        charCount.style.color = 'var(--text-muted)';
        toast('✨ 已化作星尘');
        // 切回星尘页面
        switchTab('stardust');
        state.currentCategory = 'all';
        document.querySelectorAll('.category-chip').forEach(c => c.classList.toggle('active', c.dataset.cat === 'all'));
        loadStardustPosts(true);
      } else {
        toast(d.error || '发送失败');
      }
    } catch (e) {
      toast('发送失败，请重试');
    }

    btn.disabled = false;
    btn.innerHTML = '<span>✨ 化作星尘</span>';
  });
}

// ═══════════════════ Drift Bottle ═══════════════════
function initBottle() {
  document.getElementById('navBottle').addEventListener('click', openBottle);
  document.getElementById('bottleModal').addEventListener('click', function(e) {
    if (e.target === this) closeBottle();
  });
}

async function openBottle() {
  const modal = document.getElementById('bottleModal');
  const content = document.getElementById('bottleContent');

  modal.style.display = 'flex';
  content.innerHTML = `
    <div style="text-align:center;padding:48px 0">
      <div style="font-size:52px;animation:bottleFloat 1.5s ease-in-out infinite alternate">🏺</div>
      <div style="margin-top:18px;color:var(--text-tertiary);font-size:14px">正在海面上搜寻漂流瓶……</div>
    </div>
  `;

  try {
    const r = await fetch(API + '/api/posts/random?fingerprint=' + encodeURIComponent(state.fp));
    if (r.status === 404) {
      content.innerHTML = `
        <button class="modal-close" onclick="closeBottle()">✕</button>
        <div style="text-align:center;padding:48px 0">
          <div style="font-size:40px;margin-bottom:16px">🏺</div>
          <div style="color:var(--text-tertiary);font-size:14px">${(await r.json()).error}</div>
          <button class="load-more-btn" style="margin-top:20px" onclick="openBottle()">🫧 再捞一个</button>
        </div>
      `;
      return;
    }
    const p = await r.json();

    content.innerHTML = `
      <button class="modal-close" onclick="closeBottle()">✕</button>
      <div style="text-align:center;margin-bottom:16px">
        <div style="font-size:36px">🏺</div>
        <div style="font-size:13px;color:var(--text-tertiary);margin-top:4px">你捡到了一个漂流瓶</div>
      </div>
      <div class="post-card" style="margin:0;box-shadow:none;background:rgba(255,255,255,0.02)">
        <div class="post-card-header">
          <div class="post-card-meta">
            <span class="post-card-mood">${p.mood_emoji}</span>
            <span class="post-card-author">${escHtml(p.nickname)}</span>
          </div>
          <span class="post-card-time">${timeAgo(p.created_at)}</span>
        </div>
        <div class="post-card-body">${escHtml(p.content)}</div>
        ${p.image ? `<div class="post-card-image"><img src="${p.image}" alt="漂流瓶图片" loading="lazy"></div>` : ''}
        <div style="text-align:center;margin-top:16px;color:var(--text-tertiary);font-size:13px">
          ❤️ ${p.like_count || 0} · 🫂 ${p.hug_count || 0}
        </div>
      </div>
      <div style="text-align:center;margin-top:20px">
        <button class="load-more-btn" onclick="openBottle()">🫧 再捞一个</button>
      </div>
    `;
  } catch (e) {
    content.innerHTML = `
      <button class="modal-close" onclick="closeBottle()">✕</button>
      <div style="text-align:center;padding:48px;color:var(--text-tertiary)">漂流瓶漂远了……再试一次吧</div>
    `;
  }
}

function closeBottle() {
  document.getElementById('bottleModal').style.display = 'none';
}

// ═══════════════════ My Posts ═══════════════════
async function loadMyPosts() {
  const container = document.getElementById('myPostsContainer');
  container.innerHTML = '<div class="loading-state"><div class="loading-dots"><span></span><span></span><span></span></div><div>寻找你的星尘……</div></div>';

  try {
    const r = await fetch(API + '/api/my-posts?fingerprint=' + encodeURIComponent(state.fp));
    const d = await r.json();
    container.innerHTML = '';

    if (d.posts.length === 0) {
      container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📜</div><p class="empty-state-text">你还没有写过星尘<br>每一段心事都值得被留下</p></div>';
    } else {
      d.posts.forEach(p => {
        const card = createPostCard(p);
        // 添加删除按钮
        const actions = card.querySelector('.post-card-actions');
        const delBtn = document.createElement('button');
        delBtn.className = 'post-action';
        delBtn.style.cssText = 'margin-left:auto;opacity:0.4;font-size:12px';
        delBtn.innerHTML = '🗑️ <span>删除</span>';
        delBtn.addEventListener('click', async (e) => {
          e.stopPropagation();
          if (!confirm('确定要删除这条星尘吗？')) return;
          try {
            const r = await fetch(API + '/api/post/' + p.id, {
              method: 'DELETE',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ fingerprint: state.fp })
            });
            const d = await r.json();
            if (d.success) {
              card.style.transition = 'all 0.3s ease';
              card.style.opacity = '0';
              card.style.transform = 'scale(0.95)';
              setTimeout(() => { card.remove(); if (container.children.length === 0) loadMyPosts(); }, 300);
            } else {
              toast(d.error || '删除失败');
            }
          } catch (e) { toast('删除失败'); }
        });
        actions.appendChild(delBtn);
        container.appendChild(card);
      });
    }
  } catch (e) {
    container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🛰️</div><p class="empty-state-text">连接失败</p></div>';
  }
}

// ═══════════════════ Infinite Scroll ═══════════════════
function initScrollEffects() {
  let ticking = false;
  window.addEventListener('scroll', () => {
    if (ticking) return;
    ticking = true;
    requestAnimationFrame(() => {
      if (state.currentTab === 'stardust' && !state.isLoading && state.hasMoreStardust) {
        const main = document.getElementById('mainContent');
        if (main) {
          const rect = main.getBoundingClientRect();
          if (rect.bottom - window.innerHeight < 400) {
            loadStardustPosts();
          }
        }
      }
      ticking = false;
    });
  }, { passive: true });
}

// ═══════════════════ Utilities ═══════════════════
function timeAgo(iso) {
  const then = new Date(iso + (iso.endsWith('Z') ? '' : 'Z'));
  const now = new Date();
  const diff = Math.floor((now - then) / 1000);
  if (diff < 60) return '刚刚';
  if (diff < 3600) return Math.floor(diff / 60) + '分钟前';
  if (diff < 86400) return Math.floor(diff / 3600) + '小时前';
  if (diff < 604800) return Math.floor(diff / 86400) + '天前';
  return then.toLocaleDateString('zh-CN');
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function toast(msg) {
  const container = document.getElementById('toastContainer');
  const el = document.createElement('div');
  el.className = 'toast-item';
  el.textContent = msg;
  container.appendChild(el);
  setTimeout(() => el.remove(), 2300);
}
