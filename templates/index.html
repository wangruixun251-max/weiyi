<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#080c1a">
<title>唯一 — 享受今晚</title>
<!-- v25.0625.3 听书+解压 -->

<!-- Fonts: 系统字体栈，无需外部加载 -->
<style>
/* ═══════════════════════════════════════════════════════
   「唯一」 Design System v3
   设计参考：X (Twitter) 克制排版 + Tumblr 艺术感 + 小红书社区温度
   核心隐喻：星尘·宇宙·漂流
   ═══════════════════════════════════════════════════════ */

/* ═══ Design Tokens ═══ */
:root {
  /* 暗色宇宙调色板 */
  --space-deep: #060914;
  --space: #0b1024;
  --space-light: #111838;
  --surface: rgba(17, 24, 56, 0.6);
  --surface-hover: rgba(25, 34, 72, 0.75);
  --glass: rgba(15, 20, 45, 0.7);
  --glass-border: rgba(212, 168, 83, 0.1);

  /* 文字层级 */
  --text-primary: #ebe5d5;
  --text-secondary: #9a9db8;
  --text-tertiary: #6b6f8a;
  --text-muted: #4a4d60;

  /* 强调色 */
  --gold: #d4a853;
  --gold-light: #e8c76a;
  --gold-soft: rgba(212, 168, 83, 0.1);
  --rose: #d4848c;
  --rose-soft: rgba(212, 132, 140, 0.08);
  --rose-deep: #b86a72;

  /* 分类色 */
  --cat-poetry: #e8c76a;
  --cat-quote: #7bb8d4;
  --cat-essay: #9b8ec4;
  --cat-music: #d4848c;
  --cat-film: #8ba5a5;

  /* 间距与圆角 */
  --space-xs: 4px;
  --space-sm: 8px;
  --space-md: 16px;
  --space-lg: 24px;
  --space-xl: 32px;
  --space-2xl: 48px;
  --radius-sm: 8px;
  --radius: 14px;
  --radius-lg: 20px;
  --radius-xl: 28px;
  --radius-full: 9999px;

  /* 阴影 */
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.25);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.35);
  --shadow-gold: 0 0 60px rgba(212, 168, 83, 0.06);

  /* 动效 */
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
  --duration-fast: 150ms;
  --duration-normal: 300ms;
  --duration-slow: 500ms;

  /* 字体 */
  --font-serif: 'SimSun', 'STSong', 'Noto Serif SC', serif;
  --font-sans: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
  --font-mono: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
}

/* ═══ Reset ═══ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html {
  font-size: 16px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  scroll-behavior: smooth;
}

body {
  font-family: var(--font-sans);
  background: var(--space-deep);
  color: var(--text-primary);
  min-height: 100vh;
  min-height: 100dvh;
  -webkit-tap-highlight-color: transparent;
  overflow-x: hidden;
  line-height: 1.6;
  letter-spacing: 0.01em;
}

::selection {
  background: rgba(212, 168, 83, 0.2);
  color: var(--text-primary);
}

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(212, 168, 83, 0.12); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: rgba(212, 168, 83, 0.25); }

/* ═══ Canvas 星空 ═══ */
.stars-bg {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}
#starCanvas { width: 100%; height: 100%; }

/* ═══ App 容器 ═══ */
.app {
  position: relative;
  z-index: 1;
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* ═══════════════════ Hero ═══════════════════ */
.hero {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 92vh;
  min-height: 92dvh;
  padding: var(--space-xl);
  text-align: center;
  overflow: hidden;
}

.hero-constellation {
  position: absolute;
  inset: 0;
  opacity: 0.5;
}
.hero-constellation canvas { width: 100%; height: 100%; }

.hero-content {
  position: relative;
  z-index: 2;
  animation: heroReveal 1.2s var(--ease-out) both;
}

@keyframes heroReveal {
  from { opacity: 0; transform: translateY(40px); }
  to { opacity: 1; transform: translateY(0); }
}

.hero-title {
  font-family: var(--font-serif);
  font-size: clamp(48px, 8vw, 80px);
  font-weight: 700;
  letter-spacing: 0.15em;
  display: flex;
  gap: 0.15em;
  justify-content: center;
  margin-bottom: var(--space-md);
}

.hero-char {
  display: inline-block;
  background: linear-gradient(180deg, var(--gold-light) 0%, var(--gold) 40%, #9a6c2e 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: charFloat 3s ease-in-out infinite;
}
.hero-char:nth-child(1) { animation-delay: 0s; }
.hero-char:nth-child(2) { animation-delay: 0.15s; }

@keyframes charFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}

.hero-subtitle {
  font-family: var(--font-serif);
  font-size: clamp(15px, 2.5vw, 20px);
  color: var(--text-secondary);
  font-weight: 400;
  letter-spacing: 0.12em;
  margin-bottom: var(--space-xl);
  opacity: 0;
  animation: subtitleReveal 1s 0.5s var(--ease-out) forwards;
}

@keyframes subtitleReveal {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 0.7; transform: translateY(0); }
}

.hero-daily {
  display: inline-block;
  font-family: var(--font-serif);
  font-size: 15px;
  font-style: italic;
  color: var(--gold-light);
  opacity: 0.65;
  letter-spacing: 0.08em;
  line-height: 1.8;
  max-width: 420px;
  padding: var(--space-md) var(--space-lg);
  background: var(--gold-soft);
  border-radius: var(--radius-lg);
  border: 1px solid rgba(212, 168, 83, 0.08);
  animation: dailyPulse 4s ease-in-out infinite;
}

@keyframes dailyPulse {
  0%, 100% { opacity: 0.5; }
  50% { opacity: 0.8; }
}

.hero-scroll {
  position: absolute;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%);
  color: var(--text-tertiary);
  cursor: pointer;
  animation: scrollBounce 2s ease-in-out infinite;
  opacity: 0.5;
  transition: opacity var(--duration-fast);
}
.hero-scroll:hover { opacity: 1; }

@keyframes scrollBounce {
  0%, 100% { transform: translateX(-50%) translateY(0); }
  50% { transform: translateX(-50%) translateY(8px); }
}

/* ═══════════════════ Navigation ═══════════════════ */
.nav {
  position: sticky;
  top: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px var(--space-lg);
  background: rgba(6, 9, 20, 0.78);
  backdrop-filter: saturate(180%) blur(24px);
  -webkit-backdrop-filter: saturate(180%) blur(24px);
  border-bottom: 1px solid rgba(212, 168, 83, 0.06);
  transition: all var(--duration-normal);
}

.nav.scrolled {
  box-shadow: 0 1px 20px rgba(0,0,0,0.3);
}

.nav-brand {
  font-family: var(--font-serif);
  font-size: 20px;
  font-weight: 700;
  letter-spacing: 0.2em;
  background: linear-gradient(135deg, var(--gold-light), var(--gold));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  cursor: pointer;
  user-select: none;
}

.nav-tabs {
  display: flex;
  gap: 2px;
  background: rgba(255,255,255,0.02);
  border-radius: var(--radius-full);
  padding: 3px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  max-width: calc(100vw - 100px);
  mask: linear-gradient(90deg, transparent 0%, #000 5%, #000 95%, transparent 100%);
  -webkit-mask: linear-gradient(90deg, transparent 0%, #000 5%, #000 95%, transparent 100%);
}
.nav-tabs::-webkit-scrollbar { display: none; }

.nav-tab {
  display: flex;
  align-items: center;
  gap: 3px;
  background: none;
  border: none;
  color: var(--text-tertiary);
  font-size: 12px;
  font-weight: 500;
  padding: 6px 12px;
  border-radius: var(--radius-full);
  cursor: pointer;
  font-family: inherit;
  transition: all var(--duration-normal);
  white-space: nowrap;
  flex-shrink: 0;
}
@media (min-width: 480px) {
  .nav-tab { font-size: 13px; padding: 8px 16px; gap: 5px; }
}
.nav-tab:hover { color: var(--text-secondary); }
.nav-tab:active { transform: scale(0.96); }
.nav-tab.active {
  color: var(--gold-light);
  background: var(--gold-soft);
  font-weight: 600;
}
.nav-tab-icon { font-size: 15px; line-height: 1; }
.nav-tab-label { letter-spacing: 0.04em; }

.nav-bottle {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  background: rgba(212, 132, 140, 0.08);
  border: 1px solid rgba(212, 132, 140, 0.15);
  color: var(--rose);
  font-size: 18px;
  cursor: pointer;
  transition: all var(--duration-normal);
  display: flex;
  align-items: center;
  justify-content: center;
}
.nav-bottle:hover {
  background: rgba(212, 132, 140, 0.15);
  transform: scale(1.08);
}
.nav-bottle:active { transform: scale(0.92); }

/* ═══════════════════ Main Content ═══════════════════ */
.main {
  flex: 1;
  padding: var(--space-md) var(--space-lg) 120px;
  position: relative;
  z-index: 1;
}

.tab-content {
  display: none;
  animation: tabEnter 0.45s var(--ease-out);
}
.tab-content.active { display: block; }

@keyframes tabEnter {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ═══════════════════ Category Bar ═══════════════════ */
.category-bar {
  display: flex;
  gap: var(--space-sm);
  padding: var(--space-sm) 0 var(--space-lg);
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  mask: linear-gradient(90deg, transparent, #000 3%, #000 97%, transparent);
  -webkit-mask: linear-gradient(90deg, transparent, #000 3%, #000 97%, transparent);
}
.category-bar::-webkit-scrollbar { display: none; }

.category-chip {
  flex-shrink: 0;
  padding: 7px 18px;
  border-radius: var(--radius-full);
  border: 1px solid rgba(255,255,255,0.06);
  background: var(--surface);
  color: var(--text-tertiary);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  font-family: inherit;
  transition: all var(--duration-normal);
  white-space: nowrap;
}
.category-chip:hover {
  border-color: rgba(212, 168, 83, 0.2);
  color: var(--text-secondary);
}
.category-chip.active {
  background: var(--gold-soft);
  border-color: var(--gold);
  color: var(--gold-light);
  font-weight: 600;
}

/* ═══════════════════ Masonry Grid ═══════════════════ */
.masonry {
  columns: 1;
  column-gap: var(--space-md);
}
@media (min-width: 640px) { .masonry { columns: 2; } }
@media (min-width: 1024px) { .masonry { columns: 3; column-gap: var(--space-lg); } }

/* ═══════════════════ Post Card ═══════════════════ */
.post-card {
  break-inside: avoid;
  margin-bottom: var(--space-md);
  background: var(--surface);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-radius: var(--radius);
  border: 1px solid var(--glass-border);
  padding: 20px 18px;
  transition: all 0.35s var(--ease-smooth);
  position: relative;
  overflow: hidden;
  cursor: default;
  box-shadow: var(--shadow-sm);
  animation: cardAppear 0.5s var(--ease-out) both;
}

@keyframes cardAppear {
  from { opacity: 0; transform: translateY(24px) scale(0.98); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.post-card:hover {
  background: var(--surface-hover);
  border-color: rgba(212, 168, 83, 0.18);
  transform: translateY(-2px);
  box-shadow: var(--shadow-md), 0 0 50px rgba(212, 168, 83, 0.04);
}

.post-card.curated {
  border-left: 2px solid var(--gold);
}

/* 卡片的左侧彩色条 */
.post-card::before {
  content: '';
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 2px;
  border-radius: 2px 0 0 2px;
  transition: width 0.3s var(--ease-smooth);
  opacity: 0.5;
}
.post-card:hover::before { width: 3px; opacity: 0.8; }

.post-card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}
.post-card-meta {
  display: flex;
  align-items: center;
  gap: 10px;
}
.post-card-mood {
  font-size: 18px;
  line-height: 1;
}
.post-card-author {
  font-size: 12.5px;
  font-weight: 500;
  color: var(--text-secondary);
  letter-spacing: 0.03em;
}
.post-card-badge {
  font-size: 10px;
  padding: 2px 8px;
  border-radius: var(--radius-full);
  background: var(--gold-soft);
  color: var(--gold-light);
  font-weight: 500;
  letter-spacing: 0.05em;
}
.post-card-badge.poetry { background: rgba(232,199,106,0.1); color: var(--cat-poetry); }
.post-card-badge.quote { background: rgba(123,184,212,0.1); color: var(--cat-quote); }
.post-card-badge.essay { background: rgba(155,142,196,0.1); color: var(--cat-essay); }
.post-card-badge.music { background: rgba(212,132,140,0.1); color: var(--cat-music); }

.post-card-time {
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 0.02em;
}

.post-card-body {
  font-size: 14.5px;
  line-height: 1.85;
  color: var(--text-primary);
  white-space: pre-wrap;
  word-break: break-word;
  font-weight: 400;
  letter-spacing: 0.015em;
}

.post-card-image {
  margin-top: 12px;
  border-radius: var(--radius-sm);
  overflow: hidden;
  border: 1px solid rgba(255,255,255,0.04);
}
.post-card-image img {
  width: 100%;
  max-height: 400px;
  object-fit: cover;
  display: block;
  transition: transform 0.5s ease;
}
.post-card:hover .post-card-image img {
  transform: scale(1.03);
}

.post-card-source {
  margin-top: 8px;
  font-size: 11px;
  color: var(--text-muted);
  font-style: italic;
  text-align: right;
  opacity: 0.6;
}

.post-card-actions {
  display: flex;
  gap: 14px;
  margin-top: 14px;
  padding-top: 10px;
  border-top: 1px solid rgba(255,255,255,0.03);
}

.post-action {
  display: flex;
  align-items: center;
  gap: 5px;
  background: none;
  border: none;
  color: var(--text-tertiary);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  padding: 5px 8px;
  border-radius: 6px;
  transition: all var(--duration-fast);
  font-family: inherit;
}
.post-action:hover {
  background: rgba(255,255,255,0.04);
  color: var(--text-secondary);
}
.post-action:active { transform: scale(0.94); }
.post-action.liked { color: var(--rose); background: var(--rose-soft); }
.post-action.hugged { color: var(--gold-light); background: var(--gold-soft); }
.post-action-count {
  font-size: 12px;
  min-width: 16px;
  text-align: center;
  font-variant-numeric: tabular-nums;
}

/* Like 动画 */
@keyframes heartBurst {
  0% { transform: scale(1); }
  30% { transform: scale(1.3); }
  60% { transform: scale(0.95); }
  100% { transform: scale(1); }
}
.post-action.just-liked { animation: heartBurst 0.4s var(--ease-spring); }

/* ═══════════════════ Curated Page ═══════════════════ */
.curated-intro {
  text-align: center;
  padding: var(--space-xl) var(--space-lg) var(--space-2xl);
}
.curated-title {
  font-family: var(--font-serif);
  font-size: clamp(24px, 4vw, 36px);
  font-weight: 700;
  color: var(--gold-light);
  letter-spacing: 0.1em;
  margin-bottom: var(--space-sm);
}
.curated-desc {
  font-size: 14px;
  color: var(--text-secondary);
  max-width: 420px;
  margin: 0 auto;
  line-height: 1.7;
  opacity: 0.7;
}

.curated-section {
  margin-bottom: var(--space-2xl);
}
.curated-section-header {
  display: flex;
  align-items: center;
  gap: var(--space-sm);
  margin-bottom: var(--space-lg);
  padding-bottom: var(--space-sm);
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.curated-section-icon { font-size: 20px; }
.curated-section-title {
  font-family: var(--font-serif);
  font-size: 18px;
  font-weight: 600;
  color: var(--text-primary);
  letter-spacing: 0.06em;
}
.curated-section-count {
  font-size: 12px;
  color: var(--text-tertiary);
  margin-left: auto;
}

.curated-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: var(--space-md);
}
@media (min-width: 640px) { .curated-grid { grid-template-columns: repeat(2, 1fr); } }
@media (min-width: 1024px) { .curated-grid { grid-template-columns: repeat(3, 1fr); } }

/* ═══════════════════ Write Panel ═══════════════════ */
.write-panel {
  max-width: 600px;
  margin: 0 auto;
  padding: var(--space-lg) 0;
}

.write-header {
  text-align: center;
  margin-bottom: var(--space-lg);
}
.write-header h2 {
  font-family: var(--font-serif);
  font-size: 24px;
  font-weight: 700;
  color: var(--gold-light);
  letter-spacing: 0.08em;
  margin-bottom: var(--space-xs);
}
.write-header p {
  font-size: 13px;
  color: var(--text-tertiary);
}

.write-panel textarea {
  width: 100%;
  min-height: 200px;
  background: var(--surface);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
  color: var(--text-primary);
  padding: 18px 20px;
  font-size: 15px;
  line-height: 1.9;
  resize: vertical;
  font-family: inherit;
  transition: all var(--duration-normal);
  letter-spacing: 0.02em;
}
.write-panel textarea:focus {
  outline: none;
  border-color: var(--gold);
  box-shadow: 0 0 0 3px var(--gold-soft);
}
.write-panel textarea::placeholder {
  color: var(--text-muted);
  opacity: 0.4;
  font-style: italic;
}

.write-char-count {
  text-align: right;
  font-size: 11px;
  color: var(--text-muted);
  margin-top: var(--space-xs);
  padding-right: 4px;
}

.write-image-row {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: var(--space-sm);
  margin: var(--space-md) 0;
}
.write-image-name {
  font-size: 12px;
  color: var(--text-tertiary);
  max-width: 160px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.write-image-preview {
  display: block;
  max-width: 100%;
  border-radius: var(--radius-sm);
  margin-bottom: var(--space-md);
  border: 1px solid rgba(255,255,255,0.06);
}

/* Mood Picker */
.mood-picker {
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-sm);
  margin-bottom: var(--space-lg);
}
.mood-chip {
  padding: 8px 16px;
  border-radius: var(--radius-full);
  border: 1px solid rgba(255,255,255,0.06);
  background: var(--surface);
  color: var(--text-tertiary);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  font-family: inherit;
  transition: all var(--duration-normal);
  display: flex;
  align-items: center;
  gap: 5px;
}
.mood-chip:hover {
  border-color: rgba(212, 168, 83, 0.25);
  color: var(--text-secondary);
}
.mood-chip:active { transform: scale(0.95); }
.mood-chip.selected {
  border-color: var(--gold);
  color: var(--gold-light);
  background: var(--gold-soft);
  font-weight: 600;
}

.input-nickname {
  width: 100%;
  background: var(--surface);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  padding: 12px 16px;
  font-size: 14px;
  margin-bottom: var(--space-lg);

  let fp = localStorage.getItem('weiyi_fp');
  if (!fp) {
    fp = 'fp_' + Date.now() + '_' + Math.random().toString(36).slice(2, 10);
    localStorage.setItem('weiyi_fp', fp);
  }

// ═══════════════════ Star Canvas ═══════════════════
function initStarCanvas() {
  const canvas = document.getElementById('starCanvas');
  const ctx = canvas.getContext('2d');
  let stars = [];
  let animFrame;

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }

  function createStars() {
    const count = Math.floor((canvas.width * canvas.height) / 3500);
    stars = [];
    for (let i = 0; i < count; i++) {
      stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 1.4 + 0.3,
        twinkleSpeed: Math.random() * 0.008 + 0.003,
        twinkleOffset: Math.random() * Math.PI * 2,
        hue: Math.random() < 0.15 ? 42 + Math.random() * 15 : 0, // 15% 金色星
        alpha: Math.random() * 0.5 + 0.3,
      });
    }
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const t = Date.now() * 0.001;

    for (const s of stars) {
      const alpha = s.alpha + Math.sin(t * s.twinkleSpeed * 60 + s.twinkleOffset) * 0.25;
      const clampedAlpha = Math.max(0.1, Math.min(0.85, alpha));

      if (s.hue > 0) {
        ctx.fillStyle = `hsla(${s.hue}, 60%, 75%, ${clampedAlpha})`;
      } else {
        ctx.fillStyle = `rgba(220,220,235,${clampedAlpha})`;
      }

      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fill();

      // 偶尔加辉光
      if (clampedAlpha > 0.6) {
        ctx.fillStyle = s.hue > 0
          ? `hsla(${s.hue}, 60%, 75%, ${clampedAlpha * 0.15})`
          : `rgba(220,220,235,${clampedAlpha * 0.12})`;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r * 3, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    animFrame = requestAnimationFrame(draw);
  }

  resize();
  createStars();
  draw();
  window.addEventListener('resize', () => { resize(); createStars(); });
}

// ═══════════════════ Hero Constellation ═══════════════════
function initHeroConstellation() {
  const container = document.getElementById('heroConstellation');
  const canvas = document.createElement('canvas');
  container.appendChild(canvas);
  const ctx = canvas.getContext('2d');

  let points = [];
  const CONNECT_DIST = 120;

  function resize() {
    canvas.width = container.offsetWidth;
    canvas.height = container.offsetHeight;
  }

  function createPoints() {
    const count = 25;
    points = [];
    for (let i = 0; i < count; i++) {
      points.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        vx: (Math.random() - 0.5) * 0.3,
        vy: (Math.random() - 0.5) * 0.3,
        r: Math.random() * 1.5 + 0.5,
        alpha: Math.random() * 0.5 + 0.2,
      });
    }
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 连线
    for (let i = 0; i < points.length; i++) {
      for (let j = i + 1; j < points.length; j++) {
        const dx = points[i].x - points[j].x;
        const dy = points[i].y - points[j].y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < CONNECT_DIST) {
          const alpha = (1 - dist / CONNECT_DIST) * 0.12;
          ctx.strokeStyle = `rgba(212,168,83,${alpha})`;
          ctx.lineWidth = 0.5;
          ctx.beginPath();
          ctx.moveTo(points[i].x, points[i].y);
          ctx.lineTo(points[j].x, points[j].y);
          ctx.stroke();
        }
      }
    }

    // 点
    for (const p of points) {
      ctx.fillStyle = `rgba(232,199,106,${p.alpha})`;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();

      // 移动
      p.x += p.vx;
      p.y += p.vy;
      if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
      if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
    }

    requestAnimationFrame(draw);
  }

  resize();
  createPoints();
  draw();
  window.addEventListener('resize', () => { resize(); createPoints(); });
}

function initNav() {
  const nav = document.getElementById('mainNav');

function initTabs() {
  document.querySelectorAll('.nav-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      const tabName = tab.dataset.tab;
      switchTab(tabName);
    });
  });
}

function switchTab(name) {
  state.currentTab = name;
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
  document.querySelectorAll('.tab-content').forEach(tc => tc.classList.toggle('active', tc.id === `tab-${name}`));

  // 重新触发动画
  const activeTC = document.getElementById(`tab-${name}`);
  if (activeTC) {
    activeTC.style.animation = 'none';
    activeTC.offsetHeight;
    activeTC.style.animation = '';
  }

  if (name === 'stardust' && document.getElementById('masonryGrid').children.length === 0) {
    loadStardustPosts(true);
  }
  if (name === 'curated') loadCuratedContent();
  if (name === 'listen') initListenTab();
  if (name === 'relax') initRelaxTab();
  if (name === 'mine') loadMyPosts();
}

// ═══════════════════ Stardust Posts ═══════════════════
async function loadStardustPosts(reset = false) {
  if (state.isLoading) return;
  if (reset) {
    state.stardustPage = 1;
    state.hasMoreStardust = true;
    state.cardCounter = 0;
    document.getElementById('masonryGrid').innerHTML = '';
    document.getElementById('loadMore').innerHTML = '';
  }
  if (!state.hasMoreStardust) return;

  state.isLoading = true;
  const grid = document.getElementById('masonryGrid');

  try {
    const r = await fetch(API + '/api/posts?page=' + state.stardustPage + '&fingerprint=' + encodeURIComponent(state.fp));
    const d = await r.json();

    let posts = d.posts;
    // 分类过滤（前端）
    if (state.currentCategory !== 'all') {
      posts = posts.filter(p => p.category === state.currentCategory || p.mood === state.currentCategory);
    }

    if (posts.length === 0 && reset) {
      grid.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🌌</div><p class="empty-state-text">这个分类还没有星尘<br>去写点什么吧</p></div>';
    } else {
      posts.forEach((p, i) => {
        const card = createPostCard(p);
        card.style.animationDelay = (state.cardCounter * 0.05) + 's';
        state.cardCounter++;
        grid.appendChild(card);
      });
    }

    state.hasMoreStardust = d.has_more;
    state.stardustPage++;

    const loadMore = document.getElementById('loadMore');
    if (state.hasMoreStardust) {
      loadMore.innerHTML = '<div class="load-more"><button class="load-more-btn" id="loadMoreBtn">✨ 更多星尘</button></div>';
      document.getElementById('loadMoreBtn')?.addEventListener('click', () => loadStardustPosts());
    } else {
      loadMore.innerHTML = Array.from(grid.children).length > 0
        ? '<div class="end-marker">— 已经到底啦 —</div>'
        : '';
    }
  } catch (e) {
    if (reset) grid.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🛰️</div><p class="empty-state-text">连接星尘失败<br>请检查网络</p></div>';
  }

  state.isLoading = false;
}

function createPostCard(p) {
  const card = document.createElement('div');
  card.className = 'post-card' + (p.is_curated ? ' curated' : '');

  // 左侧色条
  card.style.setProperty('--mood-color', p.mood_color);

  // Badge 类名映射
  const badgeClassMap = { '诗歌': 'poetry', '语录': 'quote', '随笔': 'essay', '音乐': 'music', '光影': 'film' };
  const badgeClass = badgeClassMap[p.category] || '';

  card.innerHTML = `
    <div class="post-card-header">
      <div class="post-card-meta">
        <span class="post-card-mood">${p.mood_emoji}</span>
        <span class="post-card-author">${escHtml(p.nickname)}</span>
        ${p.is_curated && p.category ? `<span class="post-card-badge ${badgeClass}">${p.category}</span>` : ''}
      </div>
      <span class="post-card-time">${timeAgo(p.created_at)}</span>
    </div>
    <div class="post-card-body">${escHtml(p.content)}</div>
    ${p.image ? `<div class="post-card-image"><img src="${p.image}" alt="星尘图片" loading="lazy"></div>` : ''}
    ${p.source ? `<div class="post-card-source">—— ${escHtml(p.source)}</div>` : ''}
    <div class="post-card-actions">
      <button class="post-action like-btn${p.liked_by_me ? ' liked' : ''}" data-id="${p.id}">
        ❤️ <span class="post-action-count">${p.like_count || 0}</span>
      </button>
      <button class="post-action hug-btn${p.hugged_by_me ? ' hugged' : ''}" data-id="${p.id}">
        🫂 <span class="post-action-count">${p.hug_count || 0}</span>
      </button>
    </div>
  `;

  // Like
  card.querySelector('.like-btn')?.addEventListener('click', async function(e) {
    e.stopPropagation();
    const id = this.dataset.id;
    this.classList.add('just-liked');
    setTimeout(() => this.classList.remove('just-liked'), 400);
    try {
      const r = await fetch(API + '/api/post/' + id + '/like', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ fingerprint: state.fp })
      });
      const d = await r.json();
      this.classList.toggle('liked', d.action === 'liked');
      this.querySelector('.post-action-count').textContent = d.like_count;
    } catch (e) {}
  });

  // Hug
  card.querySelector('.hug-btn')?.addEventListener('click', async function(e) {
    e.stopPropagation();
    const id = this.dataset.id;
    try {
      const r = await fetch(API + '/api/post/' + id + '/hug', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ fingerprint: state.fp })
      });
      const d = await r.json();
      this.classList.toggle('hugged', d.action === 'hugged');
      this.querySelector('.post-action-count').textContent = d.hug_count;
    } catch (e) {}
  });

  return card;
}

// ═══════════════════ Curated Content ═══════════════════
async function loadCuratedContent() {
  const container = document.getElementById('curatedContent');
  if (container.children.length > 0) return; // 已加载

  container.innerHTML = '<div class="loading-state"><div class="loading-dots"><span></span><span></span><span></span></div><div>正在策展星尘……</div></div>';

  try {
    const r = await fetch(API + '/api/posts/curated?fingerprint=' + encodeURIComponent(state.fp));
    const d = await r.json();
    container.innerHTML = '';

    const categoryIcons = {
      '诗歌': '🌸', '语录': '💡', '随笔': '📝', '音乐': '🎵', '光影': '🎬'
    };

    for (const [category, posts] of Object.entries(d.categories)) {
      if (posts.length === 0) continue;

      const section = document.createElement('div');
      section.className = 'curated-section';
      section.innerHTML = `
        <div class="curated-section-header">
          <span class="curated-section-icon">${categoryIcons[category] || '✨'}</span>
          <h3 class="curated-section-title">${category}</h3>
          <span class="curated-section-count">${posts.length} 篇</span>
        </div>
        <div class="curated-grid"></div>
      `;

      const grid = section.querySelector('.curated-grid');
      posts.forEach(p => {
        const card = createPostCard(p);
        grid.appendChild(card);
      });

      container.appendChild(section);
    }

    if (Object.keys(d.categories).length === 0) {
      container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📖</div><p class="empty-state-text">策展内容正在筹备中</p></div>';
    }
  } catch (e) {
    container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🛰️</div><p class="empty-state-text">加载策展内容失败</p></div>';
  }
}

  { title:'《瓦尔登湖》', author:'亨利·戴维·梭罗', icon:'🏞️', chapter:'第二章 · 我生活的地方，我生活的目的',
    text:'\"我步入丛林，因为我希望生活得有意义。我希望活得深刻，吸取生命中所有的精华。\"',
    tts:'我到林中去，因为我希望谨慎地生活，只面对生活的基本事实，看看我是否学得到生活要教育我的东西，免得到了临死的时候，才发现我根本就没有生活过。我不希望度过非生活的生活，生活是这样的珍贵；我也不愿意去修行过隐逸的生活，除非是万不得已。我要生活得深深地把生命的精髓都吸收到，要生活得稳稳当当，生活得斯巴达式的，以便根除一切非生活的东西，划出一块刈割的面积来，细细地修剪，把生活压缩到一个角隅里去，把它缩小到最低的条件中，如果它被证明是卑微的，那么就把那真正的卑微全部认识到，并把它的卑微之处公布于世界；或者，如果它是崇高的，就用切身的经历来体会它，在我下一次远游时，也可以作出一个真实的报道。因为，我看，大多数人还确定不了他们的生活是属于魔鬼的，还是属于上帝的呢，然而又多少有点轻率地下了判断，认为人生的主要目标是归荣耀给神，并永远从神那里得到恩赐。然而我们依然生活得卑微，像蚂蚁一样；虽然神话告诉我们说，我们早已经变成人了，像小矮人一样，我们跟仙鹤作战。这真是错上加错，叠加的纷乱，我们最优良的德性在这里成了多余而可避免的劫数。我们的生活在琐碎之中消耗掉了。一个老实的人除十指之外，便用不着更大的数字了，在特殊情况下也最多加上十个脚趾，其余不妨笼而统之。简单，简单，简单啊！我说，最好你的事只两件或三件，不要一百件或一千件；不必一百万个，半打就够了，不必计算一百万，半打就够了。你的账目只要记在你的大拇指的指甲上，在这浪急风高，云遮雾掩，电闪雷鸣的文明生活的海洋中，一个人要生活，就得经历这些风暴和流沙，除非他纵身一跳，仰天倒下去，不知所终。而照了那些说谎者的话，那条船早应该沉没了。简化，简化。不必一天三餐，如果必要，一顿也够了；用不着一百道菜，五道够多了；至于别的，就在同样的比例下来减少好了。我们的生活像德意志联邦，全是小国边界的，使得它永远不能安定，因此就连德国也还不能算是一个统一的国家。国家本身，虽然有那些所谓的内部的改良，其实也就是这样一种不切实际的，臃肿庞大的机构，塞满了家具，掉进了自己设下的陷阱，给奢侈与挥霍毁坏了，毁坏它的恰恰就是那些追求奢侈挥霍的人，而它需要的不是别的，就是简朴诚恳的生活。虽然你贫穷，但是你要爱你的生活。甚至在一个救济院里，你也有愉快、高兴、光荣的时辰。夕阳反射在救济院的窗上，像射在富人家的窗上一样光亮；在那门前，积雪同在早春融化。我只看到，一个安心的人，在那里也像在皇宫中一样，生活得心满意足而富有愉快的思想。镇上的穷人，倒往往是过着最独立不羁的生活。也许因为他们很伟大，所以受之无愧。大多数人以为他们是超然的，不靠城镇来支援，可是事实上他们是往往用了不正当的手段来对付生活，他们毫不是超然的，毋宁是不体面的。视贫穷如园中之花而像圣人一样地耕植它吧！不要找新花样，无论是新朋友或新衣服，来麻烦你自己。找旧的，回到那里去。万物不变，是我们在变。你的衣服可以卖掉，但要保留你的思想。上帝将保证你不需要社会。如果我像蜘蛛一样，整天被关在阁楼的一角，只要我有我自己的思想，对我来说，世界还是照样那样大。有一位哲人说：三军可夺帅也，匹夫不可夺志也。不要那么焦虑地寻求发展，不要屈服于许多外来的影响，那都是浪费。谦卑犹如黑暗，揭露出天堂的光辉。贫穷和卑微的阴影把我们团团围住，可是瞧吧！眼界扩大了，我们常常受惠。我们被提醒，即使赐给我们克洛索斯的巨富，我们的目的一定还是如此，我们的方法也一定还是如此。而且，如果你受贫穷的限制，比方，你就买不起书和报纸了，你的经验不过是局限于最有意义、最为重要的那一部分；你将不得不跟那些可以产生最多的糖和淀粉的物质打交道。但是挨近骨头的生活正是最甜蜜的生活。你不可能做一个无所事事的无聊之人。没有人会因为往下层去而犯错误。较高层的人宽宏大量，并不会使那较低的人失去什么。多余的财富只能够买多余的东西，人的灵魂必需的东西，是不需要花钱买的。我到瓦尔登湖去，并不是去生活得便宜，也不是去生活得昂贵，而是去在障碍最小的情况下，处理一些私人的业务；如果我去搞那些蠢事，那真是太小了，小得不像样，而且，我又是那么缺乏常识，结果只会让我的脑袋撞在墙壁上。现在，我已经在那里做了一些生意了。我一向努力培养严格的商业习惯，它们都是不可缺少的。如果你是做生意的人，那你当然需要一个固定的地方，最好是就在你的店里过夜。做生意不是别的，只不过是买卖而已。至于我，我不想叫别人劳动来供养我，除非他供养我是为了我的好处，我自己也有这个要求；但是我要给一个传教士吃，给他衣服穿，给他房子住，而他以为他是在做一件善事，办一件事工，我岂不是可以在同样的方式下供奉我自己吗？我常常看到，在铁路旁边，有一只大木箱，六英尺长，三英尺宽，工人们夜里把他们的工具锁在里面。这给我一个启示：每一个生活穷困的人，都可以花一元钱买这样一只箱子，钻几个洞，至少可以放进些空气，下雨时和晚上就可以进去，把箱盖盖上了，这样便有了自由，他的灵魂便自由了。这个似乎不坏，一点也不应该受到鄙夷。你可以随心所欲，夜游到多晚都没有关系；起身的时候，也决不会有什么房东或房主人来逼你付房租。多少人为了一只比较大，比较华丽的箱子的租金，要烦苦到死；而他是决不会冻死在这样一只箱子里的。我根本就说不上。这完全是一句老实话。' },
  { title:'《百年孤独》', author:'加西亚·马尔克斯', icon:'🦋', chapter:'第一章（开篇）',
    text:'\"多年以后，面对行刑队，奥雷里亚诺·布恩迪亚上校将会回想起父亲带他去见识冰块的那个遥远的下午。\"',
    tts:'多年以后，面对行刑队，奥雷里亚诺·布恩迪亚上校将会回想起父亲带他去见识冰块的那个遥远的下午。那时的马孔多是一个二十户人家的村落，泥巴和芦苇盖成的屋子沿河岸排开，湍急的河水清澈见底，河床里卵石洁白光滑宛如史前巨蛋。世界新生伊始，许多事物还没有名字，提到的时候尚需用手指指点点。每年三月前后，一家衣衫褴褛的吉卜赛人都会来到村边扎下帐篷，击鼓鸣笛，在喧闹欢腾中介绍新近的发明。最初他们带来了磁石。一个身形肥硕的吉卜赛人，胡须蓬乱，手如雀爪，自称梅尔基亚德斯，当众进行了一场可惊可怖的展示，号称是出自马其顿诸位炼金大师之手的第八大奇迹。他拖着两块金属锭走家串户，引发的景象使所有人目瞪口呆：铁锅、铁盆、铁钳、小铁炉纷纷跌落，木板因钉子绝望挣扎、螺丝奋力挣脱而吱嘎作响，甚至连那些丢失多日的物件也在久寻不见的地方出现，一窝蜂似的追随在梅尔基亚德斯的魔铁后面。万物皆有灵，吉卜赛人用嘶哑的嗓音宣告，只需唤起它们的灵性。何塞·阿尔卡蒂奥·布恩迪亚天马行空的想象一向超出大自然的创造，甚至超越了奇迹和魔法，他想到可以利用这个无用的发明来挖掘地下的黄金。梅尔基亚德斯是个诚实的人，他告诫说这东西干不了那个。然而何塞·阿尔卡蒂奥·布恩迪亚当时并不相信吉卜赛人的诚实，他拿一头骡子和一群山羊换了那两块磁铁。他的妻子乌尔苏拉·伊瓜兰本指望着这些牲口来重振衰败的家业，却没能拦得住他。很快我们就会金子多得铺地了，她丈夫回答。此后的几个月，他拖着两块铁锭走遍了整个地区，口中念着梅尔基亚德斯的咒语，勘测了每一寸土地，连河底也没有放过。唯一的发掘成果是一副十五世纪的盔甲，里面有一具已经钙化的骷髅，它的颈上挂着一个小铜盒，盒里装着一缕女人的头发。三月里，吉卜赛人又来了。这次他们带来一架望远镜和一台足有鼓面大小的放大镜，展出时声称是阿姆斯特丹犹太人的最新发明。他们让一个吉卜赛姑娘坐在村子的一头，在另一头支起望远镜。付上五个里亚尔，人们就能凑到目镜前，看见那个吉卜赛姑娘仿佛就在眼前。科学缩短了距离，梅尔基亚德斯高声宣布。要不了多久，人们足不出户，就可以看到世界上任何一个角落发生的事情。在一个灼热的正午，他摆弄着那台放大镜，上演了一场难以置信的奇观：他把一堆干草放在街道中央，通过聚集阳光点燃了它。何塞·阿尔卡蒂奥·布恩迪亚还在为磁铁计划失败而沮丧，这时又想到了利用这个发明制造战争机器。梅尔基亚德斯试图让他放弃，最后还是接受了两块磁铁外加三枚殖民地金币，把放大镜换给了他。乌尔苏拉难过得流下了眼泪。那些钱是从她父亲一辈子省吃俭用攒下的一匣金币里拿出来的，她本来埋藏在床底下，等待适当的时机加以利用。何塞·阿尔卡蒂奥·布恩迪亚毫不理会，他沉浸在自己的战术实验中，以身犯险，甚至亲自站在聚焦的阳光焦点下，结果身体被灼伤，溃烂的伤口许久都没有愈合。他自己差一点烧掉了房子，才总算说服了妻子。他不顾妻子的反对，对邻居们展示他的发明，高声宣讲阳光战的种种战术，那些闻所未闻的作战方略。他那些天方夜谭般的描述让村里人以为他已经失去理智，但梅尔基亚德斯回来时却赞许有加。何塞·阿尔卡蒂奥·布恩迪亚当时最感兴趣的还是梅尔基亚德斯带来的那个被称为冰块的玻璃盒子。他花了五个里亚尔，把手放在上面，仿佛凭依圣物作证一般，说道：这是世上最大的钻石。不，吉卜赛人纠正道，这是冰。何塞·阿尔卡蒂奥·布恩迪亚没有听懂。他把手伸向那块冰，就这样停在那里好几分钟，心中充满了体验神秘事物的恐惧和兴奋。他又付了五个里亚尔，把手放在冰块上，仿佛凭依圣物作证一般，说道：这是我们这个时代最伟大的发明。' },
  { title:'《活着》', author:'余华', icon:'🏮', chapter:'第一章（开篇）',
    text:'\"作为一个词语，活着在语言里充满了力量。它的力量不是来自于喊叫，也不是来自于进攻，而是忍受。\"',
    tts:'我比现在年轻十岁的时候，获得了一个游手好闲的职业，去乡间收集民间歌谣。那一年的整个夏天，我如同一只乱飞的麻雀，游荡在知了和阳光充斥的农村。我喜欢喝农民那种带有苦味的茶水，他们的茶桶就放在田埂的树下，我毫无顾忌地拿起积满茶垢的茶碗舀水喝，还把自己的水壶灌满，与田里干活的男人说上几句废话，在姑娘因我而起的窃窃私笑里扬长而去。我曾经和一位守着瓜田的老人聊了整整一个下午，这是我有生以来瓜吃得最多的一次，当我站起来告辞时，突然发现自己像个孕妇一样步履艰难了。然后我与一位当上了祖母的女人坐在门槛上，她编着草鞋为我唱了一支《十月怀胎》。我最喜欢的是傍晚来到时，坐在农民的屋前，看着他们将提上的井水泼在地上，压住蒸腾的尘土，夕阳的光芒在树梢上照射下来，拿一把他们递过来的扇子，尝尝他们和盐一样咸的咸菜，看看几个年轻女人，和男人们说着话。我头戴宽边草帽，脚上穿着拖鞋，一条毛巾挂在身后的皮带上，让它像尾巴似的拍打着我的屁股。我整日张大嘴巴打着哈欠，散漫地走在田间小道上，我的拖鞋吧嗒吧嗒，把那些小道弄得尘土飞扬，仿佛是车轮滚滚而过时的情景。我到处游荡，已经弄不清楚哪些村庄我曾经去过，哪些我没有去过。我走近一个村子时，常会听到孩子的喊叫：那个老打哈欠的人又来啦。于是村里人就知道那个会讲荤故事会唱酸曲的人又来了。其实所有荤故事所有的酸曲都是从他们那里学来的，他们自己却不知道。我知道他们的乐趣所在，因此我不觉得奇怪。我曾经遇到一个哭泣的老人，他鼻青脸肿地坐在田埂上，我问他怎么了。他告诉我他被女婿打了。我问他为什么打他。他说他偷了女婿家的鸡蛋去换酒喝。我说你这么大年纪了，女婿怎么能打你。他抹着眼泪说，是我不好，我不该偷鸡蛋。我问，你有酒喝吗？他说没有。我说，那我请你喝。他立刻不哭了，站起来跟着我走。那天我口袋里正好有些零钱，我们在镇上找了一家小酒馆，坐在靠窗的位置，要了一壶黄酒。他喝了一口，长长地叹了口气。我说，你女婿打你，你恨他吗？他说不恨。我说为什么？他说他是我女婿啊。我说女婿就能打你？他想了想说，他是我女儿的丈夫。我说那你女儿呢？他摇了摇头说，早死了。我不再问了。他又喝了一口酒，说：我这一辈子，想起来也是太难了。我点点头，他说：你是城里人吧？我说是。他说：城里人不懂的。我说那你给我讲讲。他看了我一眼，又喝了一口酒，过了好一会儿才开口。他讲的是他自己的故事，讲他叫福贵，讲他年轻时是个阔少爷，讲他怎么把家产败光，讲他怎么被抓了壮丁，讲他的妻子、他的儿女、他的外孙，一个一个地离开他。他的故事很长，他讲得很慢。我听着听着，竟忘了时间。他讲到后来，天已经黑了，酒馆里点起了油灯。他的脸上没有什么表情，就像在讲别人的事情。他说：有时候，我也想不明白，为什么活着会这么难。可是，再难，也得活下去啊。他说完这句话，站了起来，拍了拍身上的土，说：谢谢你请我喝酒。我说不用谢。他走到门口，又回过头来说：我说的这些，你要是不嫌弃，就写下来吧。我说好，我一定写下来。他点了点头，走了出去，消失在夜色里。我坐了很久，才起身离开。外面很黑，我走得很慢。我想起他说的那些话，想起他讲的那些人。家珍、凤霞、有庆、二喜、苦根……这些名字我一个都不认识，可是我觉得我认识他们。我觉得他们就在我身边，就像那个老人一样，他们活着，然后死了，然后被人记着，或者被人忘记。但无论如何，他们活过。老人说，他给那头老牛也取名叫福贵。村里人都笑他，说他和牛一个名字。老人说：我怕它知道只有自己在耕田，就多叫出几个名字去骗它。它听到还有别的牛也在耕田，就不会不高兴，耕田也就起劲啦。我也笑了。老人自己也笑了。我坐在田埂上，看着老人和老牛慢慢远去。老人粗哑的嗓音在远处传来，他的歌声在空旷的傍晚像风一样飘扬。炊烟在农舍的屋顶袅袅升起，在霞光四射的空中分散后消隐了。女人吆喝孩子的声音此起彼伏，一个男人挑着粪桶从我眼前走过，扁担吱呀吱呀一路响了过去。慢慢地，田野趋向了宁静，四周出现了模糊，霞光逐渐退去。我知道黄昏正在转瞬即逝，黑夜从天而降了。我看到广阔的土地袒露着结实的胸膛，那是召唤的姿态，就像女人召唤着她们的儿女，土地召唤着黑夜来临。' },

let listenSynth = null;
let listenUtterance = null;
let listenCurrentIdx = -1;

function initListenTab() {
  const grid = document.getElementById('listenGrid');
  if (grid.children.length > 0) return;

  LISTEN_DATA.forEach((item, idx) => {
    const card = document.createElement('div');
    card.className = 'audio-card';
    card.id = 'listen-card-' + idx;
    card.innerHTML = `
      <div class="audio-card-icon">${item.icon}</div>
      <div class="audio-card-title">${item.title}</div>
      <div class="audio-card-author">${item.author} · ${item.chapter}</div>
      <div class="audio-card-excerpt">${item.text}</div>
      <div class="audio-player-row">
        <button class="audio-btn" id="listen-btn-${idx}" onclick="toggleListen(${idx})" title="朗读">▶</button>
        <div class="audio-progress"><div class="audio-progress-bar" id="listen-progress-${idx}"></div></div>
        <div class="audio-time" id="listen-time-${idx}">0:00</div>
      </div>
    `;
    grid.appendChild(card);
  });
}

function getBestChineseVoice() {
  const voices = speechSynthesis.getVoices();
  if (voices.length === 0) return null;
  // 按自然度排序：Ting-Ting (macOS) > Google 普通话 (Android/Chrome) > 京京/粵語 > 任意 zh-CN
  const ranking = ['Ting-Ting', 'TingTing', 'Google 普通话', 'Google 國語', 'Mei-Jia', 'Sin-Ji', 'Microsoft Kangkang', 'Microsoft Yaoyao', 'zh-CN'];
  for (const name of ranking) {
    const v = voices.find(v => v.name === name && v.lang.startsWith('zh'));
    if (v) return v;
  }
  return voices.find(v => v.lang.startsWith('zh-CN')) || voices.find(v => v.lang.startsWith('zh')) || voices[0];
}

function initVoices() {
  return new Promise(resolve => {
    const voices = speechSynthesis.getVoices();
    if (voices.length > 0) { resolve(voices); return; }
    speechSynthesis.onvoiceschanged = () => resolve(speechSynthesis.getVoices());
  });
}

async function toggleListen(idx) {
  if (listenSynth) {
    listenSynth.cancel();
    resetAllListenCards();
  }

  if (listenCurrentIdx === idx) {
    listenCurrentIdx = -1;
    return;
  }

  listenCurrentIdx = idx;
  const item = LISTEN_DATA[idx];
  const card = document.getElementById('listen-card-' + idx);
  const btn = document.getElementById('listen-btn-' + idx);
  const progBar = document.getElementById('listen-progress-' + idx);
  const timeEl = document.getElementById('listen-time-' + idx);

  card.classList.add('playing');
  btn.classList.add('playing');
  btn.textContent = '⏸';

  // 等待 voices 加载（部分浏览器需要异步获取）
  await initVoices();
  
  listenSynth = window.speechSynthesis;
  listenUtterance = new SpeechSynthesisUtterance(item.tts);
  listenUtterance.lang = 'zh-CN';
  listenUtterance.rate = 0.78;   // 更慢，更从容
  listenUtterance.pitch = 0.95;  // 稍低沉，减少尖锐感
  listenUtterance.volume = 0.9;

  const bestVoice = getBestChineseVoice();
  if (bestVoice) {
    listenUtterance.voice = bestVoice;
  }

  const startTime = Date.now();
  const estDuration = item.tts.length * 65;

  const progressInterval = setInterval(() => {
    const elapsed = (Date.now() - startTime) / 1000;
    const total = estDuration / 1000;
    const pct = Math.min(100, (elapsed / total) * 100);
    progBar.style.width = pct + '%';
    const mins = Math.floor(elapsed / 60);
    const secs = Math.floor(elapsed % 60);
    timeEl.textContent = mins + ':' + (secs < 10 ? '0' : '') + secs;
  }, 250);

  listenUtterance.onend = () => {
    clearInterval(progressInterval);
    progBar.style.width = '100%';
    resetAllListenCards();
    listenCurrentIdx = -1;
  };

  listenUtterance.onerror = () => {
    clearInterval(progressInterval);
    resetAllListenCards();
    listenCurrentIdx = -1;
  };

  listenSynth.speak(listenUtterance);
}

function resetAllListenCards() {
  document.querySelectorAll('#listenGrid .audio-card').forEach(c => c.classList.remove('playing'));
  document.querySelectorAll('#listenGrid .audio-btn').forEach(b => { b.classList.remove('playing'); b.textContent = '▶'; });
}

let relaxInterval = null;

function initRelaxTab() {
  const grid = document.getElementById('relaxGrid');
  if (grid.children.length > 0) return;

  RELAX_DATA.forEach(item => {
    const card = document.createElement('div');
    card.className = 'audio-card';
    card.id = 'relax-card-' + item.id;
    card.innerHTML = `
      <div class="audio-card-icon">${item.icon}</div>
      <div class="audio-card-title">${item.name}</div>
      <div class="audio-card-excerpt" style="max-height:none">${item.desc}</div>
      <div class="relax-wave"><span></span><span></span><span></span><span></span><span></span><span></span></div>
      <div class="audio-player-row">
        <button class="audio-btn" id="relax-btn-${item.id}" onclick="toggleRelax('${item.id}')" title="播放">▶</button>
        <input type="range" class="volume-slider" id="relax-vol-${item.id}" min="0" max="100" value="50" oninput="setRelaxVolume('${item.id}', this.value)" title="音量">
      </div>
    `;
    grid.appendChild(card);
  });
}

function toggleRelax(id) {
  const item = RELAX_DATA.find(r => r.id === id);
  if (!item) return;

  const card = document.getElementById('relax-card-' + id);
  const btn = document.getElementById('relax-btn-' + id);
  const volSlider = document.getElementById('relax-vol-' + id);

  // Stop current
  if (relaxCurrentId === id && relaxSource) {
    stopRelax();
    relaxCurrentId = null;
    return;
  }

  // Stop any previous
  stopRelax();
  relaxCurrentId = id;

  // Init AudioContext
  if (!relaxCtx) {
    relaxCtx = new (window.AudioContext || window.webkitAudioContext)();
  }

  relaxGain = relaxCtx.createGain();
  relaxGain.gain.value = parseFloat(volSlider.value) / 100 * 0.3;
  relaxGain.connect(relaxCtx.destination);

  card.classList.add('playing');
  btn.classList.add('playing');
  btn.textContent = '⏸';

  if (item.freq === 'noise') {
    // Generate white/brown noise
    const bufferSize = 2 * relaxCtx.sampleRate;
    const buffer = relaxCtx.createBuffer(1, bufferSize, relaxCtx.sampleRate);
    const data = buffer.getChannelData(0);
    let b0 = 0, b1 = 0, b2 = 0;
    for (let i = 0; i < bufferSize; i++) {
      const white = Math.random() * 2 - 1;
      if (item.filter === 'lowpass') {
        // Brown noise (rain-like)
        b0 = 0.997 * b0 + 0.03 * white;
        data[i] = b0 * 2;
      } else if (item.filter === 'bandpass') {
        // Approximate bandpass
        b0 = 0.995 * b0 + 0.005 * white;
        b1 = 0.98 * b1 + 0.02 * (b0 - b1);
        data[i] = b1 * 3;
      } else {
        data[i] = white;
      }
    }
    relaxSource = relaxCtx.createBufferSource();
    relaxSource.buffer = buffer;
    relaxSource.loop = true;
    relaxSource.connect(relaxGain);
    relaxSource.start();
  } else if (item.freq === 'crackle') {
    // Fire crackle: random pops
    const bufferSize = relaxCtx.sampleRate;
    const buffer = relaxCtx.createBuffer(1, bufferSize, relaxCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) {
      if (Math.random() < 0.002) {
        data[i] = (Math.random() * 2 - 1) * 0.8;
      } else {
        data[i] = 0;
      }
    }
    relaxSource = relaxCtx.createBufferSource();
    relaxSource.buffer = buffer;
    relaxSource.loop = true;
    relaxSource.connect(relaxGain);
    relaxSource.start();
  } else if (item.freq === 'chirp') {
    // Bird-like tones: random sine chirps
    const bufferSize = relaxCtx.sampleRate * 4;
    const buffer = relaxCtx.createBuffer(1, bufferSize, relaxCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) {
      const t = i / relaxCtx.sampleRate;
      const chirpCycle = Math.floor(t / 2);
      const phaseInCycle = (t % 2) / 2;
      if (Math.random() < 0.003) {
        const freq = 600 + Math.random() * 800;
        data[i] = Math.sin(2 * Math.PI * freq * t) * 0.06 * (1 - phaseInCycle);
      } else {
        data[i] += (Math.random() * 2 - 1) * 0.01; // ambient
      }
    }
    relaxSource = relaxCtx.createBufferSource();
    relaxSource.buffer = buffer;
    relaxSource.loop = true;
    relaxSource.connect(relaxGain);
    relaxSource.start();
  }
}

function setRelaxVolume(id, val) {
  if (relaxCurrentId === id && relaxGain) {
    relaxGain.gain.value = parseFloat(val) / 100 * 0.3;
  }
}

function stopRelax() {
  if (relaxSource) {
    try { relaxSource.stop(); } catch(e) {}
    relaxSource = null;
  }
  if (relaxInterval) {
    clearInterval(relaxInterval);
    relaxInterval = null;
  }
  document.querySelectorAll('#relaxGrid .audio-card').forEach(c => c.classList.remove('playing'));
  document.querySelectorAll('#relaxGrid .audio-btn').forEach(b => { b.classList.remove('playing'); b.textContent = '▶'; });
}

// ═══════════════════ Write Form ═══════════════════
function initMoodPicker() {
  const container = document.getElementById('moodPicker');
  container.innerHTML = Object.entries(MOODS).map(([k, v]) =>
    `<span class="mood-chip${k === state.selectedMood ? ' selected' : ''}" data-mood="${k}">${v.emoji} ${k}</span>`
  ).join('');

  container.querySelectorAll('.mood-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      state.selectedMood = chip.dataset.mood;
      container.querySelectorAll('.mood-chip').forEach(c => c.classList.remove('selected'));
      chip.classList.add('selected');
    });
  });
}

function initImageUpload() {
  const input = document.getElementById('imageInput');
  const btn = document.getElementById('imageBtn');
  const nameEl = document.getElementById('imageName');
  const clearBtn = document.getElementById('imageClear');
  const preview = document.getElementById('imagePreview');

  btn.addEventListener('click', () => input.click());

  input.addEventListener('change', () => {
    const file = input.files[0];
    if (!file) return;
    nameEl.textContent = file.name;
    clearBtn.style.display = 'inline-flex';

    const reader = new FileReader();
    reader.onload = function(e) {
      const img = new Image();
      img.onload = function() {
        const canvas = document.createElement('canvas');
        let w = img.width, h = img.height;
        const maxW = 800;
        if (w > maxW) { h = h * maxW / w; w = maxW; }
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        state.uploadImageData = canvas.toDataURL('image/jpeg', 0.65);
        preview.src = state.uploadImageData;
        preview.style.display = 'block';
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });

  clearBtn.addEventListener('click', () => {
    state.uploadImageData = '';
    input.value = '';
    nameEl.textContent = '';
    clearBtn.style.display = 'none';
    preview.style.display = 'none';
  });
}

function initWriteForm() {
  const textarea = document.getElementById('writeContent');
  const charCount = document.getElementById('charCount');

  textarea.addEventListener('input', () => {
    charCount.textContent = textarea.value.length;
    charCount.style.color = textarea.value.length > 900 ? 'var(--rose)' : 'var(--text-muted)';
  });

  document.getElementById('sendBtn').addEventListener('click', async () => {
    const content = textarea.value.trim();
    if (!content) { toast('写点什么吧 ✨'); return; }

    const btn = document.getElementById('sendBtn');
    btn.disabled = true;
    btn.innerHTML = '<span>正在化作星尘……</span>';

    try {
      const r = await fetch(API + '/api/post', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          content,
          image: state.uploadImageData,
          mood: state.selectedMood,
          nickname: document.getElementById('writeNickname').value.trim(),
          fingerprint: state.fp,
        })
      });
      const d = await r.json();
      if (d.success) {
        textarea.value = '';
        document.getElementById('writeNickname').value = '';
        state.uploadImageData = '';
        document.getElementById('imageInput').value = '';
        document.getElementById('imageName').textContent = '';
        document.getElementById('imageClear').style.display = 'none';
        document.getElementById('imagePreview').style.display = 'none';
        charCount.textContent = '0';
        charCount.style.color = 'var(--text-muted)';
        toast('✨ 已化作星尘');
        // 切回星尘页面
        switchTab('stardust');
        state.currentCategory = 'all';
        document.querySelectorAll('.category-chip').forEach(c => c.classList.toggle('active', c.dataset.cat === 'all'));
        loadStardustPosts(true);
      } else {
        toast(d.error || '发送失败');
      }
    } catch (e) {
      toast('发送失败，请重试');
    }

    btn.disabled = false;
    btn.innerHTML = '<span>✨ 化作星尘</span>';
  });
}

// ═══════════════════ Drift Bottle ═══════════════════
function initBottle() {
  document.getElementById('navBottle').addEventListener('click', openBottle);
  document.getElementById('bottleModal').addEventListener('click', function(e) {
    if (e.target === this) closeBottle();
  });
}

async function openBottle() {
  const modal = document.getElementById('bottleModal');
  const content = document.getElementById('bottleContent');

  modal.style.display = 'flex';
  content.innerHTML = `
    <div style="text-align:center;padding:48px 0">
      <div style="font-size:52px;animation:bottleFloat 1.5s ease-in-out infinite alternate">🏺</div>
      <div style="margin-top:18px;color:var(--text-tertiary);font-size:14px">正在海面上搜寻漂流瓶……</div>
    </div>
  `;

  try {
    const r = await fetch(API + '/api/posts/random?fingerprint=' + encodeURIComponent(state.fp));
    if (r.status === 404) {
      content.innerHTML = `
        <button class="modal-close" onclick="closeBottle()">✕</button>
        <div style="text-align:center;padding:48px 0">
          <div style="font-size:40px;margin-bottom:16px">🏺</div>
          <div style="color:var(--text-tertiary);font-size:14px">${(await r.json()).error}</div>
          <button class="load-more-btn" style="margin-top:20px" onclick="openBottle()">🫧 再捞一个</button>
        </div>
      `;
      return;
    }
    const p = await r.json();

    content.innerHTML = `
      <button class="modal-close" onclick="closeBottle()">✕</button>
      <div style="text-align:center;margin-bottom:16px">
        <div style="font-size:36px">🏺</div>
        <div style="font-size:13px;color:var(--text-tertiary);margin-top:4px">你捡到了一个漂流瓶</div>
      </div>
      <div class="post-card" style="margin:0;box-shadow:none;background:rgba(255,255,255,0.02)">
        <div class="post-card-header">
          <div class="post-card-meta">
            <span class="post-card-mood">${p.mood_emoji}</span>
            <span class="post-card-author">${escHtml(p.nickname)}</span>
          </div>
          <span class="post-card-time">${timeAgo(p.created_at)}</span>
        </div>
        <div class="post-card-body">${escHtml(p.content)}</div>
        ${p.image ? `<div class="post-card-image"><img src="${p.image}" alt="漂流瓶图片" loading="lazy"></div>` : ''}
        <div style="text-align:center;margin-top:16px;color:var(--text-tertiary);font-size:13px">
          ❤️ ${p.like_count || 0} · 🫂 ${p.hug_count || 0}
        </div>
      </div>
      <div style="text-align:center;margin-top:20px">
        <button class="load-more-btn" onclick="openBottle()">🫧 再捞一个</button>
      </div>
    `;
  } catch (e) {
    content.innerHTML = `
      <button class="modal-close" onclick="closeBottle()">✕</button>
      <div style="text-align:center;padding:48px;color:var(--text-tertiary)">漂流瓶漂远了……再试一次吧</div>
    `;
  }
}

function closeBottle() {
  document.getElementById('bottleModal').style.display = 'none';
}

// ═══════════════════ My Posts ═══════════════════
async function loadMyPosts() {
  const container = document.getElementById('myPostsContainer');
  container.innerHTML = '<div class="loading-state"><div class="loading-dots"><span></span><span></span><span></span></div><div>寻找你的星尘……</div></div>';

  try {
    const r = await fetch(API + '/api/my-posts?fingerprint=' + encodeURIComponent(state.fp));
    const d = await r.json();
    container.innerHTML = '';

    if (d.posts.length === 0) {
      container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📜</div><p class="empty-state-text">你还没有写过星尘<br>每一段心事都值得被留下</p></div>';
    } else {
      d.posts.forEach(p => {
        const card = createPostCard(p);
        // 添加删除按钮
        const actions = card.querySelector('.post-card-actions');
        const delBtn = document.createElement('button');
        delBtn.className = 'post-action';
        delBtn.style.cssText = 'margin-left:auto;opacity:0.4;font-size:12px';
        delBtn.innerHTML = '🗑️ <span>删除</span>';
        delBtn.addEventListener('click', async (e) => {
          e.stopPropagation();
          if (!confirm('确定要删除这条星尘吗？')) return;
          try {
            const r = await fetch(API + '/api/post/' + p.id, {
              method: 'DELETE',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ fingerprint: state.fp })
            });
            const d = await r.json();
            if (d.success) {
              card.style.transition = 'all 0.3s ease';
              card.style.opacity = '0';
              card.style.transform = 'scale(0.95)';
              setTimeout(() => { card.remove(); if (container.children.length === 0) loadMyPosts(); }, 300);
            } else {
              toast(d.error || '删除失败');
            }
          } catch (e) { toast('删除失败'); }
        });
        actions.appendChild(delBtn);
        container.appendChild(card);
      });
    }
  } catch (e) {
    container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🛰️</div><p class="empty-state-text">连接失败</p></div>';
  }
}

// ═══════════════════ Infinite Scroll ═══════════════════
function initScrollEffects() {
  let ticking = false;
  window.addEventListener('scroll', () => {
    if (ticking) return;
    ticking = true;
    requestAnimationFrame(() => {
      if (state.currentTab === 'stardust' && !state.isLoading && state.hasMoreStardust) {
        const main = document.getElementById('mainContent');
        if (main) {
          const rect = main.getBoundingClientRect();
          if (rect.bottom - window.innerHeight < 400) {
            loadStardustPosts();
          }
        }
      }
      ticking = false;
    });
  }, { passive: true });
}

// ═══════════════════ Utilities ═══════════════════
function timeAgo(iso) {
  const then = new Date(iso + (iso.endsWith('Z') ? '' : 'Z'));
  const now = new Date();
  const diff = Math.floor((now - then) / 1000);
  if (diff < 60) return '刚刚';
  if (diff < 3600) return Math.floor(diff / 60) + '分钟前';
  if (diff < 86400) return Math.floor(diff / 3600) + '小时前';
  if (diff < 604800) return Math.floor(diff / 86400) + '天前';
  return then.toLocaleDateString('zh-CN');
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function toast(msg) {
  const container = document.getElementById('toastContainer');
  const el = document.createElement('div');
  el.className = 'toast-item';
  el.textContent = msg;
  container.appendChild(el);
  setTimeout(() => el.remove(), 2300);
}
